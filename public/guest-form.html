<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宿泊者名簿 / Guest Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; }
    .form-card { max-width: 640px; margin: 1rem auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .form-header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; border-radius: 12px 12px 0 0; padding: 1.5rem; text-align: center; }
    .form-header h1 { font-size: 1.3rem; margin: 0; padding-top: 2rem; }
    .form-header p { margin: 0.5rem 0 0; opacity: 0.85; font-size: 0.9rem; }
    .lang-switch { position: absolute; top: 0.5rem; right: 0.5rem; }
    .lang-switch .btn { font-size: 0.8rem; padding: 2px 10px; }
    .section-title { font-size: 1rem; font-weight: 600; border-left: 4px solid #3498db; padding-left: 0.75rem; margin: 1.5rem 0 1rem; }
    .guest-block { background: #f8f9fa; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .guest-block-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.75rem; color: #2c3e50; }
    .success-view { text-align: center; padding: 3rem 1rem; }
    .success-view i { font-size: 4rem; color: #27ae60; }
    .required-mark { color: #e74c3c; }
    .other-input { display: none; margin-top: 0.5rem; }
    .other-input.show { display: block; }
    .info-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 0.75rem; font-size: 0.85rem; }
    .warning-box { background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 8px; padding: 0.75rem; font-size: 0.85rem; }
    .parking-info { background: #e8f4fd; border: 1px solid #b8daff; border-radius: 8px; padding: 0.75rem; font-size: 0.85rem; }
    .error-box { background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 8px; padding: 0.75rem; font-size: 0.9rem; color: #721c24; font-weight: 600; }
    .noise-cancel-msg { background: #fff5f5; border: 1px solid #e53e3e; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; margin-top: 0.5rem; color: #c53030; }
    .alloc-item { display: flex; align-items: baseline; gap: 0; padding: 0.35rem 0; }
    .alloc-spot { min-width: 8em; flex-shrink: 0; }
    .alloc-arrow { color: #3498db; font-weight: 700; }
    .alloc-spot { font-weight: 600; }
    .alloc-paid { color: #856404; }
    .alloc-warn { color: #dc3545; font-size: 0.8rem; }
    @media (max-width: 640px) { .form-card { margin: 0; border-radius: 0; } .form-header { border-radius: 0; } }
  </style>
</head>
<body>
  <div class="card form-card" id="formView">
    <div class="form-header position-relative">
      <div class="lang-switch">
        <button class="btn btn-sm btn-outline-light active" data-lang="ja">日本語</button>
        <button class="btn btn-sm btn-outline-light" data-lang="en">English</button>
      </div>
      <h1 id="formTitle">宿泊者名簿</h1>
      <p id="formSubtitle">ご宿泊に必要な情報をご記入ください</p>
    </div>
    <div class="card-body px-4 py-3">
      <div id="bookingInfo" class="alert alert-info d-none">
        <strong id="lbl_bookingInfo">ご予約情報</strong>: <span id="bookingInfoText"></span>
      </div>
      <form id="guestForm" novalidate>

        <!-- === 0. 騒音ルール同意（黄色カード） === -->
        <div class="alert alert-warning mb-3" id="noiseRuleSection">
          <h6 class="fw-bold mb-2" id="lbl_noiseTitle"></h6>
          <p class="small mb-2" id="lbl_noiseIntro"></p>
          <div class="small mb-2 ps-2" id="noiseRuleDetail" style="border-left: 3px solid #e65100;">
            <strong id="lbl_noiseQuietHours"></strong>
            <ul class="mb-1 mt-1 ps-3">
              <li id="lbl_noiseRule1"></li>
              <li id="lbl_noiseRule2"></li>
              <li id="lbl_noiseRule3"></li>
              <li id="lbl_noiseRule4"></li>
            </ul>
          </div>
          <div class="small fw-bold text-danger mb-3 p-2 rounded" style="background:rgba(229,62,0,0.08);" id="lbl_noiseEviction"></div>
          <div class="form-check mb-1">
            <input class="form-check-input" type="radio" name="noiseChoice" id="noiseAgree" value="agree">
            <label class="form-check-label" for="noiseAgree" id="lbl_noiseAgreeRadio"></label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="noiseChoice" id="noiseCancel" value="cancel">
            <label class="form-check-label text-danger" for="noiseCancel" id="lbl_noiseCancelRadio"></label>
          </div>
          <div id="noiseNextBtn" class="d-none mt-3">
            <button type="button" class="btn btn-primary w-100" id="btnGoToGame"></button>
          </div>
        </div>
        <div class="noise-cancel-msg d-none" id="noiseCancelMsg"></div>
        <input type="hidden" id="f_noiseAgree" value="false">

        <!-- === フォーム本体（agreed=true 時に表示） === -->
        <div id="formBody" class="d-none">

        <!-- === 1. 宿泊情報 === -->
        <h6 class="section-title" id="sec_stay"></h6>
        <div class="row g-2 mb-2">
          <div class="col-6">
            <label class="form-label" for="f_checkIn" id="lbl_checkIn"></label>
            <input type="date" class="form-control" id="f_checkIn" required>
          </div>
          <div class="col-6">
            <label class="form-label" for="f_checkInTime" id="lbl_checkInTime"></label>
            <select class="form-select" id="f_checkInTime" required>
              <option value="">--</option>
              <option>15:00</option><option>15:30</option>
              <option>16:00</option><option>16:30</option><option>17:00</option><option>17:30</option>
              <option>18:00</option><option>18:30</option><option>19:00</option><option>19:30</option>
              <option>20:00</option>
              <option value="20:00以降" id="opt_checkInAfter20">20:00以降</option>
            </select>
          </div>
        </div>
        <div class="row g-2 mb-2">
          <div class="col-6">
            <label class="form-label" for="f_checkOut" id="lbl_checkOut"></label>
            <input type="date" class="form-control" id="f_checkOut" required>
          </div>
          <div class="col-6">
            <label class="form-label" for="f_checkOutTime" id="lbl_checkOutTime"></label>
            <select class="form-select" id="f_checkOutTime" required>
              <option value="">--</option>
              <option>7:00</option><option>7:30</option><option>8:00</option><option>8:30</option>
              <option>9:00</option><option>9:30</option><option>10:00</option>
            </select>
            <details class="mt-1 mb-0">
              <summary class="text-danger small fw-bold" style="cursor:pointer;" id="lbl_lateCheckOutSummary"></summary>
              <ul class="text-danger small mt-1 mb-0">
                <li id="lbl_lateCheckOutNote1"></li>
                <li id="lbl_lateCheckOutNote2"></li>
              </ul>
            </details>
          </div>
        </div>
        <!-- アーリーチェックイン・レイトチェックアウトの選択肢は廃止。罰金注記はチェックアウト時間の下に表示 -->
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label" for="f_guestCount" id="lbl_guestCount"></label>
            <input type="number" class="form-control" id="f_guestCount" min="1" value="1" required>
          </div>
          <div class="col-6">
            <label class="form-label" for="f_guestCountInfants" id="lbl_guestCountInfants"></label>
            <input type="number" class="form-control" id="f_guestCountInfants" min="0" value="0">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="f_bookingSite" id="lbl_bookingSite"></label>
          <select class="form-select" id="f_bookingSite" required>
            <option value="">--</option>
            <option>Airbnb</option><option>Booking.com</option>
            <option value="楽天トラベル" id="opt_rakuten">楽天トラベル</option>
            <option value="じゃらん" id="opt_jalan">じゃらん</option>
            <option>Agoda</option><option>VRBO</option><option>Trip.com</option>
            <option value="自社公式ウェブサイト" id="opt_official">自社公式ウェブサイト</option>
            <option value="直接予約" id="opt_direct">直接予約</option>
            <option value="その他" id="opt_bookingOther">その他</option>
          </select>
          <input type="text" class="form-control other-input" id="f_bookingSiteOther" placeholder="">
        </div>

        <!-- === 2. 宿泊者情報 === -->
        <h6 class="section-title" id="sec_guests"></h6>
        <p class="text-muted small" id="lbl_guestsNote"></p>
        <div id="guestInputList"></div>

        <!-- === 3. 施設利用情報 === -->
        <h6 class="section-title" id="sec_facility"></h6>

        <!-- 交通手段 -->
        <div class="mb-3">
          <label class="form-label fw-bold" id="lbl_transport"></label>
          <select class="form-select" id="f_transport">
            <option value="">--</option>
            <option value="車" id="opt_tr_car">車</option>
            <option value="公共交通機関" id="opt_tr_public">公共交通機関</option>
            <option value="タクシー" id="opt_tr_taxi">タクシー</option>
            <option value="徒歩" id="opt_tr_walk">徒歩</option>
            <option value="その他" id="opt_tr_other">その他</option>
          </select>
          <input type="text" class="form-control other-input" id="f_transportOther" placeholder="">
        </div>
        <div class="mb-3 d-none" id="taxiWarn">
          <div class="warning-box mb-2">
            <i class="bi bi-exclamation-triangle-fill text-danger me-1"></i>
            <span id="lbl_taxiWarn"></span>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="f_taxiAgree">
            <label class="form-check-label small" for="f_taxiAgree" id="lbl_taxiAgree"></label>
          </div>
        </div>

        <!-- 車の場合 -->
        <div class="d-none" id="carSection">
          <!-- 1. 台数 -->
          <div class="mb-3">
            <label class="form-label" id="lbl_carCount"></label>
            <select class="form-select" id="f_carCount" required>
              <option value="">--</option>
              <option value="1" id="opt_car1">1台</option><option value="2" id="opt_car2">2台</option>
              <option value="3" id="opt_car3">3台</option><option value="4" id="opt_car4">4台</option>
              <option value="5" id="opt_car5">5台</option>
              <option value="6" id="opt_car6">6台</option>
              <option value="over" id="opt_carOver">7台以上</option>
            </select>
          </div>
          <div class="error-box mb-3 d-none" id="carOverError">
            <i class="bi bi-x-circle me-1"></i><span id="lbl_carOverError"></span>
          </div>

          <!-- 2. 車種（全台分） -->
          <div id="vehicleTypeList" class="mb-3"></div>

          <!-- 3. 割り当て結果（有料が必要なら自動で含む） -->
          <div id="parkingAllocation" class="mb-3 d-none"></div>

          <!-- 4. 駐車場の注意事項（チェック必須） -->
          <div class="d-none" id="parkingNotes">
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="f_neighborAgree" style="margin-top: 0.35em;">
              <label class="form-check-label" for="f_neighborAgree">
                <span class="text-danger fw-bold" id="lbl_parkNeighborWarn"></span>
                <span class="required-mark">*</span>
              </label>
            </div>
          </div>

          <!-- 5. 有料駐車場（1枚のカード） -->
          <div class="d-none mb-3" id="paidParkingGuide">
            <div class="card border-primary">
              <div class="card-header bg-primary bg-opacity-10 py-2">
                <span class="fw-bold"><i class="bi bi-p-circle me-1"></i><span id="lbl_ppTitle"></span></span>
              </div>
              <div class="card-body py-2 px-3">
                <p class="small mb-2" id="lbl_ppIntro"></p>
                <p class="small fw-bold mb-1" id="lbl_ppBenefitsTitle"></p>
                <ul class="small mb-2">
                  <li id="lbl_ppBen1"></li>
                  <li id="lbl_ppBen2"></li>
                  <li id="lbl_ppBen3"></li>
                  <li><span id="lbl_ppBen4"></span> <a href="https://ikko-kentiku.com/calendar.html" target="_blank" rel="noopener" id="lbl_ppCafeLink"></a></li>
                </ul>
                <p class="small fw-bold mb-1" id="lbl_ppDetailsTitle"></p>
                <ul class="small mb-2">
                  <li id="lbl_ppPrice"></li>
                  <li id="lbl_ppTime"></li>
                  <li id="lbl_ppMax"></li>
                  <li><span id="lbl_ppLocation"></span> <a href="https://www.google.com/maps/place/34.213105,132.622144" target="_blank" rel="noopener">→MAP</a></li>
                </ul>
                <p class="small fw-bold mb-1" id="lbl_ppNotesTitle"></p>
                <ul class="small mb-2">
                  <li id="lbl_ppNote1"></li>
                  <li id="lbl_ppNote2"></li>
                  <li id="lbl_ppNote3"></li>
                  <li id="lbl_ppNote4"></li>
                  <li id="lbl_ppNote5"></li>
                  <li id="lbl_ppNote6"></li>
                  <li id="lbl_ppNote7"></li>
                </ul>
                <div id="parkingPhotos" class="d-none mb-2">
                  <p class="small fw-bold mb-1" id="lbl_ppPhotosTitle"></p>
                  <div class="d-flex gap-2 flex-wrap" id="parkingPhotoContainer"></div>
                </div>
                <hr class="my-2">
                <!-- 利用選択（カード内の一番下） -->
                <div class="d-none" id="paidParkingSelect">
                  <label class="form-label fw-bold small mb-1" id="lbl_ppSelectLabel"></label>
                  <select class="form-select form-select-sm" id="f_paidParking" required>
                    <option value="">--</option>
                    <option value="利用しない" id="opt_pp0">利用しない</option>
                    <option value="1台利用" id="opt_pp1">1台利用</option>
                    <option value="2台利用" id="opt_pp2">2台利用</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- BBQ -->
        <div class="mb-3">
          <label class="form-label" for="f_bbq" id="lbl_bbq"></label>
          <select class="form-select" id="f_bbq" required>
            <option value="">--</option>
            <option value="利用しない" id="opt_bbqNo">利用しない</option>
            <option value="利用する" id="opt_bbqYes">利用する</option>
          </select>
          <div class="mt-2 d-none" id="bbqRules">
            <p class="small text-muted mb-2" id="lbl_bbqRulesIntro"></p>
            <div class="form-check mb-1">
              <input class="form-check-input bbq-rule-check" type="checkbox" id="f_bbqRule1">
              <label class="form-check-label small" for="f_bbqRule1" id="lbl_bbqRule1"></label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input bbq-rule-check" type="checkbox" id="f_bbqRule2">
              <label class="form-check-label small" for="f_bbqRule2" id="lbl_bbqRule2"></label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input bbq-rule-check" type="checkbox" id="f_bbqRule3">
              <label class="form-check-label small" for="f_bbqRule3" id="lbl_bbqRule3"></label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input bbq-rule-check" type="checkbox" id="f_bbqRule4">
              <label class="form-check-label small" for="f_bbqRule4" id="lbl_bbqRule4"></label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input bbq-rule-check" type="checkbox" id="f_bbqRule5">
              <label class="form-check-label small" for="f_bbqRule5" id="lbl_bbqRule5"></label>
            </div>
          </div>
        </div>

        <!-- ベッドの希望（2名のみ） -->
        <div class="mb-3 d-none" id="bedChoiceSection">
          <label class="form-label" for="f_bedChoice" id="lbl_bedChoice"></label>
          <select class="form-select" id="f_bedChoice">
            <option value="">--</option>
            <option value="2人で1台のベッドを利用（2階リビング）" id="opt_bed1">2人で1台のベッドを利用（2階リビング）</option>
            <option value="1人1台ずつベッドを利用（1階和室）" id="opt_bed2">1人1台ずつベッドを利用（1階和室）</option>
          </select>
        </div>

        <!-- === 4. アンケート === -->
        <h6 class="section-title" id="sec_survey"></h6>
        <div class="mb-3">
          <label class="form-label" for="f_purpose" id="lbl_purpose"></label>
          <select class="form-select" id="f_purpose">
            <option value="">--</option>
            <option value="出張" id="opt_purp1">出張</option>
            <option value="宮島" id="opt_purp2">宮島</option>
            <option value="原爆ドーム" id="opt_purp3">原爆ドーム</option>
            <option value="広島市内観光" id="opt_purp4">広島市内観光</option>
            <option value="呉観光" id="opt_purp5">呉観光</option>
            <option value="大和ミュージアム" id="opt_purp6">大和ミュージアム</option>
            <option value="中国地方観光" id="opt_purp7">中国地方観光</option>
            <option value="中四国観光" id="opt_purp8">中四国観光</option>
            <option value="その他" id="opt_purpOther">その他</option>
          </select>
          <input type="text" class="form-control other-input" id="f_purposeOther" placeholder="">
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label" for="f_previousStay" id="lbl_previousStay"></label>
            <input type="text" class="form-control" id="f_previousStay">
          </div>
          <div class="col-6">
            <label class="form-label" for="f_nextStay" id="lbl_nextStay"></label>
            <input type="text" class="form-control" id="f_nextStay">
          </div>
        </div>

        <!-- === 5. 緊急連絡先 === -->
        <h6 class="section-title" id="sec_emergency"></h6>
        <p class="text-muted small" id="lbl_emergencyNote"></p>
        <div class="row g-2 mb-3">
          <div class="col-md-6">
            <label class="form-label" for="f_emergencyName" id="lbl_emergencyName"></label>
            <input type="text" class="form-control" id="f_emergencyName" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="f_emergencyPhone" id="lbl_emergencyPhone"></label>
            <input type="tel" class="form-control" id="f_emergencyPhone" required>
          </div>
        </div>
        <div class="error-box mb-3 d-none" id="emergencyPhoneError">
          <i class="bi bi-x-circle me-1"></i><span id="lbl_emergencyPhoneError"></span>
        </div>

        <!-- === 6. 同意 === -->
        <h6 class="section-title" id="sec_agreement"></h6>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="f_houseRuleAgree" required>
          <label class="form-check-label" for="f_houseRuleAgree" id="lbl_houseRuleAgree"></label>
        </div>

        <div class="d-grid mt-4 mb-2">
          <button type="submit" class="btn btn-primary btn-lg" id="btnSubmit"><i class="bi bi-send"></i> <span id="lbl_submit">送信する</span></button>
        </div>
        <p class="text-center text-muted small" id="lbl_privacy"></p>
        </div><!-- /formBody -->
      </form>
    </div>
  </div>

  <div class="card form-card d-none" id="successView">
    <div class="card-body success-view">
      <i class="bi bi-check-circle-fill"></i>
      <h3 class="mt-3" id="lbl_successTitle">送信完了</h3>
      <p class="text-muted" id="lbl_successMsg">ご記入ありがとうございます。<br>ご宿泊を楽しみにお待ちしております。</p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-storage-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDU4ZkCNDzvGpT9BaBlum8bCK5P20Cu-Fs",
      authDomain: "minpaku-v2.firebaseapp.com",
      projectId: "minpaku-v2",
      storageBucket: "minpaku-v2.firebasestorage.app",
      messagingSenderId: "418111574543",
      appId: "1:418111574543:web:6b2f386281e39f4d23c97a",
    });
    const db = firebase.firestore();
    const storage = firebase.storage();

    /* ============================
       駐車場 割り当てロジック（順番非依存・最適化版）
       ============================
       在庫:
         5番  : 全サイズ ×1（最も駐車しやすい）
         1番  : 軽・小型のみ ×1
         未舗装: 軽・小型 ×2 OR それ以外 ×1
         有料  : 全サイズ ×2 (2,000円/台/泊)

       最適化方針: 無料駐車場の利用を最大化（有料を最小化）
         - 未舗装は軽×2がスペース効率最大（非軽×1だと1枠無駄）
         - 非軽は5番を優先利用
         - 軽は1番→未舗装→5番の順（5番を非軽に空けるため）
    */
    function allocateParking(vehicles) {
      const compacts = vehicles.filter(v => v.type === "compact");
      const nonCompacts = vehicles.filter(v => v.type !== "compact");
      const result = [];
      const unallocated = [];

      // 5番: 非軽を優先（非軽がなければ軽）
      if (nonCompacts.length > 0) {
        result.push({ ...nonCompacts.shift(), spot: "spot5" });
      } else if (compacts.length > 0) {
        result.push({ ...compacts.shift(), spot: "spot5" });
      }

      // 1番: 軽のみ
      if (compacts.length > 0) {
        result.push({ ...compacts.shift(), spot: "spot1" });
      }

      // 未舗装: 軽×2を優先（非軽×1より効率的）
      if (compacts.length >= 2) {
        result.push({ ...compacts.shift(), spot: "unpaved" });
        result.push({ ...compacts.shift(), spot: "unpaved" });
      } else if (compacts.length === 1) {
        result.push({ ...compacts.shift(), spot: "unpaved" });
      } else if (nonCompacts.length > 0) {
        result.push({ ...nonCompacts.shift(), spot: "unpaved" });
      }

      // 残り = 有料駐車場行き
      unallocated.push(...compacts, ...nonCompacts);
      return { result, unallocated };
    }

    // 台数ベースで収容可能か判定（順番に依存しない）
    function canAllocate(numCompact, numNonCompact) {
      let c = numCompact, nc = numNonCompact;
      // 5番: 非軽優先
      if (nc > 0) nc--; else if (c > 0) c--;
      // 1番: 軽のみ
      if (c > 0) c--;
      // 未舗装: 軽×2優先、なければ非軽×1
      if (c >= 2) c -= 2;
      else if (c === 1) c--;
      else if (nc > 0) nc--;
      // 残り = 有料（最大2台）
      return (c + nc) <= 2;
    }

    // 車種値 → allocation用のtype
    function vtToType(val) {
      if (val.includes("軽") || val.includes("小型") || val.includes("Compact")) return "compact";
      if (val.includes("ミニバン") || val.includes("Minivan")) return "minivan";
      return "large";
    }

    // 全長5m級を選択した車種セレクトの直下に警告を表示

      document.querySelectorAll(".vt-large-warn").forEach(el => el.remove());

    // ===== 車種グレーアウト（全体の車種構成ベース・順番非依存） =====
    function updateVehicleTypeAvailability() {
      const selects = document.querySelectorAll(".vt-select");
      if (selects.length <= 1) return;

      const t = i18n[currentLang];
      document.querySelectorAll(".vt-allgrey-warn").forEach(el => el.remove());

      // 全スロットの現在の選択を集計
      let totalC = 0, totalNC = 0;
      selects.forEach(sel => {
        if (sel.value) {
          if (vtToType(sel.value) === "compact") totalC++; else totalNC++;
        }
      });

      selects.forEach(sel => {
        // このスロットの選択を除いた集計
        let baseC = totalC, baseNC = totalNC;
        if (sel.value) {
          if (vtToType(sel.value) === "compact") baseC--; else baseNC--;
        }

        // 各車種を追加した場合に収容可能か（全体の台数構成で判定）
        const avail = {
          compact: canAllocate(baseC + 1, baseNC),
          minivan: canAllocate(baseC, baseNC + 1),
          large: canAllocate(baseC, baseNC + 1),
        };

        const typeMap = {
          "軽自動車/小型車": "compact",
          "ミニバン以下（セレナ等）": "minivan",
          "全長5m級（アルファード等）": "large",
        };
        let allDisabled = true;
        sel.querySelectorAll("option").forEach(opt => {
          if (!opt.value || opt.value === "") return;
          const type = typeMap[opt.value];
          if (!type) return;
          if (!avail[type]) {
            opt.disabled = true;
            const suffix = currentLang === "ja" ? "（駐車場に空きなし）" : " (no space)";
            if (!opt.textContent.includes(suffix)) opt.textContent += suffix;
            if (sel.value === opt.value) sel.value = "";
          } else {
            opt.disabled = false;
            opt.textContent = opt.textContent.replace(/（駐車場に空きなし）| \(no space\)/g, "");
            allDisabled = false;
          }
        });

        // 全車種がグレーアウト → 台数を減らす案内
        if (allDisabled && !sel.value) {
          const warn = document.createElement("div");
          warn.className = "vt-allgrey-warn error-box mt-1 mb-2";
          warn.innerHTML = currentLang === "ja"
            ? '<i class="bi bi-x-circle me-1"></i>この台数ではどの車種も駐車場の上限を超えてしまいます。乗り合わせるなどして台数を減らしてください。'
            : '<i class="bi bi-x-circle me-1"></i>No vehicle type can be accommodated at this count. Please carpool to reduce the number of cars.';
          sel.parentElement.appendChild(warn);
        }
      });
    }

    // ===== 駐車場割り当て実行・表示 =====
    // 全台を無料に割り当て→あふれ→有料に自動振り分け→案内表示
    function runParkingAllocation() {
      const container = document.getElementById("parkingAllocation");
      const selects = document.querySelectorAll(".vt-select");
      const t = i18n[currentLang];
      const totalCars = parseInt(document.getElementById("f_carCount").value) || 0;

      if (selects.length === 0 || totalCars === 0) {
        container.classList.add("d-none");
        document.getElementById("paidParkingGuide").classList.add("d-none"); document.getElementById("paidParkingSelect").classList.add("d-none"); document.getElementById("f_paidParking").required = false;
        document.getElementById("parkingNotes").classList.add("d-none"); updateNeighborAgreeRequired(false);
        return;
      }

      // 車種グレーアウト更新
      updateVehicleTypeAvailability();

      // 全車種が選択されているか確認
      const vehicles = [];
      let allSelected = true;
      selects.forEach((sel, i) => {
        if (!sel.value) { allSelected = false; return; }
        vehicles.push({ type: vtToType(sel.value), label: sel.value, index: i + 1 });
      });
      if (!allSelected) {
        container.classList.add("d-none");
        document.getElementById("paidParkingGuide").classList.add("d-none"); document.getElementById("paidParkingSelect").classList.add("d-none"); document.getElementById("f_paidParking").required = false;
        document.getElementById("parkingNotes").classList.add("d-none"); updateNeighborAgreeRequired(false);
        return;
      }

      // 全車を無料駐車場に割り当て試行
      const { result, unallocated } = allocateParking(vehicles);
      const paidRequired = unallocated.length;

      // 有料込みでも収容不可（有料最大2台超え）
      if (paidRequired > 2) {
        container.innerHTML = `<div class="error-box">${t.allocError}</div>`;
        container.classList.remove("d-none");
        document.getElementById("parkingNotes").classList.remove("d-none"); updateNeighborAgreeRequired(true);
        document.getElementById("paidParkingGuide").classList.add("d-none"); document.getElementById("paidParkingSelect").classList.add("d-none"); document.getElementById("f_paidParking").required = false;
        document.getElementById("f_paidParking").value = "";
        return;
      }

      const vtDisplay = (label) => {
        if (label.includes("軽") || label.includes("小型")) return t.vt_small;
        if (label.includes("ミニバン")) return t.vt_minivan;
        return t.vt_large;
      };

      // スポット基準で表示データを構築
      const spotData = { unpaved: [], spot1: [], spot5: [] };
      for (const r of result) {
        spotData[r.spot].push(r);
      }

      let html = `<div class="parking-info"><p class="fw-bold mb-2">${t.allocTitle}</p>`;

      // 未舗装駐車場（同じ車種をまとめて表示）
      if (spotData.unpaved.length > 0) {
        const typeCount = {};
        spotData.unpaved.forEach(r => { const t2 = vtDisplay(r.label); typeCount[t2] = (typeCount[t2]||0)+1; });
        const desc = Object.entries(typeCount).map(([t2,c]) => c > 1 ? `${t2} ${c}台` : t2).join(", ");
        html += `<div class="alloc-item"><span class="alloc-spot fw-bold">${t.spotUnpaved}</span>
          <span class="text-muted ms-2">${desc}</span></div>`;
      }
      // 1番
      if (spotData.spot1.length > 0) {
        const types = spotData.spot1.map(r => vtDisplay(r.label)).join(", ");
        html += `<div class="alloc-item"><span class="alloc-spot fw-bold">${t.spotOne}</span>
          <span class="text-muted ms-2">${types}</span></div>`;
      }
      // 5番
      if (spotData.spot5.length > 0) {
        const types = spotData.spot5.map(r => vtDisplay(r.label)).join(", ");
        html += `<div class="alloc-item"><span class="alloc-spot fw-bold">${t.spotFive}</span>
          <span class="text-muted ms-2">${types}</span></div>`;
      }
      // 有料駐車場
      const paidNums = currentLang === "ja" ? ["①","②"] : ["#1","#2"];
      const priceTag = currentLang === "ja" ? "2,000円/泊" : "¥2,000/night";
      for (let i = 0; i < paidRequired; i++) {
        const label = unallocated[i] ? vtDisplay(unallocated[i].label) : "";
        html += `<div class="alloc-item"><span class="alloc-spot alloc-paid fw-bold">${currentLang === "ja"
          ? `有料駐車場${paidNums[i]}` : `Paid ${paidNums[i]}`}</span>
          <span class="text-muted ms-2">${label}${label ? " " : ""}<span class="text-danger fw-bold">${priceTag}</span></span></div>`;
      }

      // 有料駐車場がある場合、詳細カードへのリンク
      if (paidRequired > 0) {
        html += `<p class="mb-0 mt-1 small"><a href="#" onclick="document.getElementById('paidParkingGuide').scrollIntoView({behavior:'smooth',block:'start'});return false;" class="text-decoration-none"><i class="bi bi-arrow-down-circle me-1"></i>${currentLang === "ja" ? "有料駐車場の詳細はこちら ▼" : "Paid parking details ▼"}</a></p>`;
      }

      html += '</div>';
      container.innerHTML = html;
      container.classList.remove("d-none");
      document.getElementById("parkingNotes").classList.remove("d-none"); updateNeighborAgreeRequired(true);

      // 有料駐車場案内＆利用選択を常時表示
      document.getElementById("paidParkingGuide").classList.remove("d-none");
      const selectDiv = document.getElementById("paidParkingSelect");
      const ppSel = document.getElementById("f_paidParking");
      const ppLabel = document.getElementById("lbl_ppSelectLabel");
      selectDiv.classList.remove("d-none");
      ppSel.required = true;

      const opt0 = document.getElementById("opt_pp0");
      const opt1 = document.getElementById("opt_pp1");
      const opt2 = document.getElementById("opt_pp2");

      // 「--」（空option）を常にdisabledにし、戻れなくする
      const optBlank = ppSel.querySelector('option[value=""]');
      if (paidRequired === 0) {
        ppLabel.innerHTML = t.ppOptional;
        opt0.disabled = false; opt1.disabled = false; opt2.disabled = false;
      } else if (paidRequired === 1) {
        ppLabel.innerHTML = t.ppRequired;
        opt0.disabled = true; opt1.disabled = false; opt2.disabled = false;
        if (!ppSel.value || ppSel.value === "利用しない" || ppSel.value === "No thanks" || ppSel.value === "") ppSel.value = "1台利用";
      } else {
        ppLabel.innerHTML = t.ppRequired;
        opt0.disabled = true; opt1.disabled = true; opt2.disabled = false;
        ppSel.value = "2台利用";
      }
      // 値が選択されたら「--」をdisabledにして戻れなくする
      if (ppSel.value) optBlank.disabled = true;
      ppSel.addEventListener("change", function() {
        if (this.value) optBlank.disabled = true;
      }, { once: true });
    }

    // ===== BBQ =====
    function updateBbqUI() {
      const v = document.getElementById("f_bbq").value;
      const show = v === "利用する" || v === "Yes";
      document.getElementById("bbqRules").classList.toggle("d-none", !show);
      document.querySelectorAll(".bbq-rule-check").forEach(cb => { cb.required = show; if (!show) cb.checked = false; });
    }

    // チェックイン/アウト時間警告は廃止（選択肢自体を削除済み）

    // ===== 緊急連絡先電話番号重複チェック =====
    function checkEmergencyPhone() {
      const rp = document.querySelector(".guest-block:first-child .g-phone");
      const ep = document.getElementById("f_emergencyPhone");
      if (!rp || !ep) return true;
      const rv = rp.value.replace(/[\s\-()]/g, ""), ev = ep.value.replace(/[\s\-()]/g, "");
      const dup = rv && ev && rv === ev;
      document.getElementById("emergencyPhoneError").classList.toggle("d-none", !dup);
      return !dup;
    }

    function setupOtherToggle(selId, inpId) {
      const sel = document.getElementById(selId), inp = document.getElementById(inpId);
      sel.addEventListener("change", () => {
        const isO = sel.value === "その他" || sel.value === "Other";
        inp.classList.toggle("show", isO); if (isO) inp.focus(); else inp.value = "";
      });
    }

    function getParams() {
      const p = {}; const s = location.search || location.hash.split("?")[1] || "";
      new URLSearchParams(s.replace(/^[?#]/,"")).forEach((v,k) => p[k]=v);
      const m = location.pathname.match(/\/form\/([^/?]+)/); if (m) p.bookingId = m[1];
      return p;
    }

    async function prefillFromBooking(bid) {
      try {
        const doc = await db.collection("bookings").doc(bid).get(); if (!doc.exists) return;
        const b = doc.data();
        const toD = v => { if (!v) return ""; const d = v.toDate ? v.toDate() : new Date(v); if (isNaN(d)) return ""; return new Date(d.getTime()+9*3600000).toISOString().slice(0,10); };
        if (b.checkIn) { const el = document.getElementById("f_checkIn"); if (el) el.value = toD(b.checkIn); }
        if (b.checkOut) { const el = document.getElementById("f_checkOut"); if (el) el.value = toD(b.checkOut); }
        if (b.guestCount) { const el = document.getElementById("f_guestCount"); if (el) { el.value = b.guestCount; renderGuestInputs(); } }
        if (b.guestName) setTimeout(() => { const ne = document.querySelector(".guest-block:first-child .g-name"); if (ne) ne.value = b.guestName; }, 100);
        document.getElementById("bookingInfoText").textContent = `${toD(b.checkIn)} ~ ${toD(b.checkOut)}`;
        document.getElementById("bookingInfo").classList.remove("d-none");
      } catch (e) { console.warn("予約情報取得失敗:", e); }
    }

    async function uploadPassportPhotos() {
      const inputs = document.querySelectorAll(".g-passport-photo"), urls = [];
      for (const inp of inputs) {
        if (inp.files && inp.files[0]) {
          const f = inp.files[0], ref = storage.ref(`passport-photos/${Date.now()}_${f.name}`);
          await ref.put(f); urls.push(await ref.getDownloadURL());
        }
      }
      return urls;
    }

    // ===== 送信 =====
    async function submitForm(e) {
      e.preventDefault();
      const form = document.getElementById("guestForm"), t = i18n[currentLang];

      if (document.getElementById("f_carCount").value === "over") {
        document.getElementById("carOverError").scrollIntoView({ behavior: "smooth", block: "center" }); return;
      }

      // 割り当て不可チェック
      const vtSels = document.querySelectorAll(".vt-select");
      if (vtSels.length > 0) {
        const vs = []; vtSels.forEach((s,i) => { if (s.value) vs.push({ type: vtToType(s.value), label: s.value, index: i+1 }); });
        if (vs.length === vtSels.length) {
          const { unallocated } = allocateParking(vs);
          if (unallocated.length > 0) {
            document.getElementById("parkingAllocation").scrollIntoView({ behavior: "smooth", block: "center" }); return;
          }
        }
      }

      if (!checkEmergencyPhone()) {
        document.getElementById("emergencyPhoneError").scrollIntoView({ behavior: "smooth", block: "center" }); return;
      }
      if (!form.checkValidity()) {
        form.classList.add("was-validated");
        const inv = form.querySelector(":invalid"); if (inv) inv.scrollIntoView({ behavior: "smooth", block: "center" }); return;
      }

      const btn = document.getElementById("btnSubmit");
      btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>' + t.submitting;

      try {
        const ppUrls = await uploadPassportPhotos();
        const guests = []; let phIdx = 0;
        document.querySelectorAll(".guest-block").forEach((block, i) => {
          const isRep = i === 0;
          const g = { name: block.querySelector(".g-name").value.trim(), nationality: block.querySelector(".g-nationality").value.trim() || (currentLang==="ja"?"日本":"Japan"), address: block.querySelector(".g-address").value.trim(), age: block.querySelector(".g-age").value.trim() };
          if (isRep) { g.phone = block.querySelector(".g-phone")?.value.trim()||""; g.email = block.querySelector(".g-email")?.value.trim()||""; }
          const pp = block.querySelector(".g-passport"); if (pp && pp.value.trim()) g.passportNumber = pp.value.trim();
          const pph = block.querySelector(".g-passport-photo");
          if (pph && pph.files && pph.files[0]) { g.passportPhotoUrl = ppUrls[phIdx]||""; phIdx++; }
          guests.push(g);
        });
        const rep = guests[0]||{}, companions = guests.slice(1);
        let bookingSite = document.getElementById("f_bookingSite").value;
        if (bookingSite === "その他" || bookingSite === "Other") { const o = document.getElementById("f_bookingSiteOther").value.trim(); if (o) bookingSite = o; }
        let purpose = document.getElementById("f_purpose").value;
        if (purpose === "その他" || purpose === "Other") { const o = document.getElementById("f_purposeOther").value.trim(); if (o) purpose = o; }
        let transport = document.getElementById("f_transport").value;
        if (transport === "その他" || transport === "Other") { const o = document.getElementById("f_transportOther").value.trim(); if (o) transport = o; }
        const vehicleTypes = []; document.querySelectorAll(".vt-select").forEach(s => { if (s.value) vehicleTypes.push(s.value); });

        // 割り当て結果を保存
        let parkingAllocation = null;
        if (vehicleTypes.length > 0) {
          const vs = vehicleTypes.map((v,i) => ({ type: vtToType(v), label: v, index: i+1 }));
          const alloc = allocateParking(vs);
          parkingAllocation = alloc.result.map(r => ({ index: r.index, vehicleType: r.label, spot: r.spot }));
        }

        const data = {
          checkIn: document.getElementById("f_checkIn").value,
          checkOut: document.getElementById("f_checkOut").value,
          checkInTime: document.getElementById("f_checkInTime").value,
          checkOutTime: document.getElementById("f_checkOutTime").value,
          guestCount: Number(document.getElementById("f_guestCount").value)||1,
          guestCountInfants: Number(document.getElementById("f_guestCountInfants").value)||0,
          bookingSite, guestName: rep.name, nationality: rep.nationality, address: rep.address,
          phone: rep.phone||"", email: rep.email||"",
          passportNumber: rep.passportNumber||"", passportPhotoUrl: rep.passportPhotoUrl||"",
          guests: companions, transport,
          carCount: parseInt(document.getElementById("f_carCount").value)||0,
          vehicleTypes, parkingAllocation,
          paidParking: document.getElementById("f_paidParking").value || "",
          bbq: document.getElementById("f_bbq").value,
          bedChoice: document.getElementById("f_bedChoice").value,
          purpose,
          previousStay: document.getElementById("f_previousStay").value.trim(),
          nextStay: document.getElementById("f_nextStay").value.trim(),
          emergencyName: document.getElementById("f_emergencyName").value.trim(),
          emergencyPhone: document.getElementById("f_emergencyPhone").value.trim(),
          noiseAgree: document.getElementById("f_noiseAgree").value === "true",
          houseRuleAgree: document.getElementById("f_houseRuleAgree").checked,
          allGuests: guests, source: "guest_form",
          submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        };
        const params = getParams();
        data.bookingId = params.bookingId||""; data.propertyId = params.propertyId||"";
        await db.collection("guestRegistrations").add(data);
        document.getElementById("formView").classList.add("d-none");
        document.getElementById("successView").classList.remove("d-none");
      } catch (err) {
        console.error("送信エラー:", err); alert(t.submitError);
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-send"></i> ' + t.submit;
      }
    }

    // ===== 初期化 =====
    document.addEventListener("DOMContentLoaded", async () => {
      const params = getParams();
      if (params.lang === "en") currentLang = "en";
      document.querySelectorAll(".lang-switch .btn").forEach(btn => btn.addEventListener("click", () => { currentLang = btn.dataset.lang; applyLang(); }));
      applyLang();

      // === 騒音ルール同意フロー制御 ===
      const noiseSection = document.getElementById("noiseRuleSection");
      const formBody = document.getElementById("formBody");
      const cancelMsgEl = document.getElementById("noiseCancelMsg");

      if (params.agreed === "true") {
        // ゲーム完了後の復帰 → 黄色カードスキップ、フォーム表示
        noiseSection.classList.add("d-none");
        cancelMsgEl.classList.add("d-none");
        formBody.classList.remove("d-none");
        document.getElementById("f_noiseAgree").value = "true";
      } else {
        // 初回アクセス → 黄色カードのみ表示
        formBody.classList.add("d-none");
        document.getElementById("noiseAgree").addEventListener("change", () => {
          document.getElementById("noiseNextBtn").classList.remove("d-none");
          cancelMsgEl.classList.add("d-none");
        });
        document.getElementById("noiseCancel").addEventListener("change", () => {
          document.getElementById("noiseNextBtn").classList.add("d-none");
          cancelMsgEl.classList.remove("d-none");
        });
        document.getElementById("btnGoToGame").addEventListener("click", () => {
          // 元のパラメータをnoise-gameに引き継ぐ
          const rp = new URLSearchParams();
          for (const [k, v] of Object.entries(params)) {
            if (k !== "agreed") rp.set(k, v);
          }
          const langParam = params.lang || currentLang;
          const gameUrl = "https://mini-games-minpaku-v2.web.app/noise-game.html?lang=" + langParam + "&returnParams=" + encodeURIComponent(rp.toString());
          window.location.href = gameUrl;
        });
      }

      setupOtherToggle("f_bookingSite", "f_bookingSiteOther");
      setupOtherToggle("f_purpose", "f_purposeOther");
      document.getElementById("f_guestCount").addEventListener("change", () => renderGuestInputs());
      document.getElementById("f_guestCount").addEventListener("input", () => renderGuestInputs());
      // チェックイン日変更→チェックアウト日のmin制約
      document.getElementById("f_checkIn").addEventListener("change", function() {
        const coEl = document.getElementById("f_checkOut");
        if (this.value) {
          // チェックアウトはチェックイン翌日以降
          const nextDay = new Date(new Date(this.value).getTime() + 86400000).toISOString().slice(0, 10);
          coEl.min = nextDay;
          if (coEl.value && coEl.value < nextDay) coEl.value = nextDay;
        } else {
          coEl.min = "";
        }
      });
      document.getElementById("f_transport").addEventListener("change", updateTransportUI);
      document.getElementById("f_carCount").addEventListener("change", updateCarUI);
      document.getElementById("f_bbq").addEventListener("change", updateBbqUI);
      document.getElementById("f_emergencyPhone").addEventListener("input", checkEmergencyPhone);
      if (params.bookingId) await prefillFromBooking(params.bookingId);
      if (params.checkIn) { const el = document.getElementById("f_checkIn"); if (el) el.value = params.checkIn; }
      if (params.checkOut) { const el = document.getElementById("f_checkOut"); if (el) el.value = params.checkOut; }
      if (params.guests) { const el = document.getElementById("f_guestCount"); if (el) { el.value = params.guests; renderGuestInputs(); } }
      document.getElementById("guestForm").addEventListener("submit", submitForm);

      // 全requiredセレクトの「--」を選択後に戻れなくする
      document.querySelectorAll("select[required]").forEach(sel => {
        sel.addEventListener("change", function() {
          if (this.value) {
            const blank = this.querySelector('option[value=""]');
            if (blank) blank.disabled = true;
          }
        });
      });

      // 駐車場写真の読み込み
      loadParkingPhotos();
    });

    // 駐車場写真を読み込み（public/img/parking/にファイルがあれば表示）
    async function loadParkingPhotos() {
      const photos = ["parking1.jpg","parking2.jpg","parking3.jpg"];
      const container = document.getElementById("parkingPhotoContainer");
      const section = document.getElementById("parkingPhotos");
      let loaded = 0;
      for (const name of photos) {
        const img = new Image();
        img.src = `/img/parking/${name}`;
        img.alt = name; img.className = "rounded"; img.style.cssText = "width:140px;height:105px;object-fit:cover;";
        img.onload = () => { container.appendChild(img); loaded++; if (loaded > 0) section.classList.remove("d-none"); };
      }
    }
  </script>
</body>
</html>
