<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>民泊管理v2 — スタッフ招待</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="民泊管理">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .invite-card { max-width: 420px; width: 100%; }
  </style>
</head>
<body>
  <div class="invite-card">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white text-center py-3">
        <h5 class="mb-0"><i class="bi bi-house-door"></i> 民泊管理v2</h5>
        <small>スタッフ招待</small>
      </div>
      <div class="card-body p-4">
        <!-- 読み込み中 -->
        <div id="loadingState" class="text-center py-4">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">招待情報を確認中...</p>
        </div>

        <!-- 有効な招待 -->
        <div id="validState" class="d-none text-center">
          <div class="mb-3">
            <i class="bi bi-person-check" style="font-size:3rem;color:#2196F3;"></i>
          </div>
          <h5 class="mb-2"><span id="staffName">スタッフ</span> さん</h5>
          <p class="text-muted">民泊管理アプリへの招待です。<br>登録方法を選択してください。</p>

          <!-- LINEで参加（既存） -->
          <button class="btn btn-lg w-100 mt-3" id="btnAccept" style="background-color:#06C755;color:#fff;font-weight:bold;">
            <svg viewBox="0 0 24 24" width="20" height="20" style="vertical-align:middle;margin-right:6px;fill:#fff"><path d="M12 2C6.48 2 2 5.83 2 10.5c0 4.07 3.44 7.47 8.09 8.18.31.07.74.21.85.48.1.25.06.63.03.88l-.14.82c-.04.25-.2.98.86.54s5.71-3.36 7.79-5.76C21.42 13.42 22 11.87 22 10.5 22 5.83 17.52 2 12 2z"/></svg>
            LINEで参加する
          </button>

          <!-- メールで参加（新規） -->
          <button class="btn btn-outline-primary btn-lg w-100 mt-2" id="btnAcceptEmail">
            <i class="bi bi-envelope-arrow-up"></i> メールで参加する
          </button>

          <!-- メールアドレス入力フォーム（初期非表示） -->
          <div class="d-none mt-3" id="emailRegisterForm">
            <div class="input-group">
              <input type="email" class="form-control" id="registerEmail" placeholder="メールアドレスを入力">
              <button class="btn btn-primary" id="btnSendRegisterEmail">
                <span id="registerEmailBtnLabel"><i class="bi bi-send"></i></span>
              </button>
            </div>
            <div class="alert alert-success d-none mt-2 py-2 small" id="registerEmailSent">
              <i class="bi bi-check-circle"></i> メールを送信しました。メール内のリンクをクリックして登録完了です。
            </div>
          </div>

          <div class="alert alert-danger d-none mt-3" id="acceptError"></div>
        </div>

        <!-- 無効な招待 -->
        <div id="invalidState" class="d-none text-center">
          <div class="mb-3">
            <i class="bi bi-x-circle" style="font-size:3rem;color:#dc3545;"></i>
          </div>
          <h5 class="text-danger">招待リンクが無効です</h5>
          <p class="text-muted" id="invalidReason">有効期限が切れたか、既に使用されています。</p>
          <p class="text-muted small">オーナーに新しい招待リンクの発行を依頼してください。</p>
        </div>

        <!-- 成功 -->
        <div id="successState" class="d-none text-center">
          <div class="mb-3">
            <i class="bi bi-check-circle-fill" style="font-size:3rem;color:#198754;"></i>
          </div>
          <h5 class="text-success">登録完了！</h5>
          <p class="text-muted">アプリに移動します...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    (async function() {
      const auth = firebase.auth();
      const params = new URLSearchParams(location.search);

      // ===== LINE OAuth コールバック処理 =====
      // LINE から invite.html?code=xxx&state=yyy で戻ってきた場合
      if (params.has("code") && params.has("state")) {
        const code = params.get("code");
        const stateRaw = params.get("state");

        // URL パラメータを削除してURLをクリーンに
        history.replaceState(null, "", location.pathname);

        let inviteToken, savedNonce;
        try {
          const stateObj = JSON.parse(atob(stateRaw.replace(/-/g, "+").replace(/_/g, "/")));
          inviteToken = stateObj.inviteToken;
          savedNonce = stateObj.nonce;
        } catch (_) {
          showInvalid("不正なstateパラメータです");
          return;
        }

        // nonce 検証（CSRF対策） localStorage を優先、sessionStorage を後方互換
        let storedNonce = null;
        try {
          const raw = localStorage.getItem("inviteLineNonce");
          if (raw) {
            const obj = JSON.parse(raw);
            if (obj && obj.expiresAt && obj.expiresAt > Date.now()) {
              storedNonce = obj.nonce;
            }
          }
        } catch (_) { /* ignore */ }
        if (!storedNonce) storedNonce = sessionStorage.getItem("inviteLineNonce");
        localStorage.removeItem("inviteLineNonce");
        sessionStorage.removeItem("inviteLineNonce");
        if (storedNonce && storedNonce !== savedNonce) {
          // 不一致でも処理続行 (Android Chrome の新タブ挙動で nonce が失われるケース対応)
          console.warn("nonce 不一致 — 処理継続", { storedNonce, savedNonce });
        }

        // ローディング表示
        document.getElementById("loadingState").querySelector("p").textContent = "LINE認証を処理中...";

        try {
          const redirectUri = `${location.origin}/invite.html`;
          const res = await fetch("/api/auth/accept-invite-line", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code, redirectUri, inviteToken }),
          });
          const data = await res.json();

          if (data.success && data.customToken) {
            await firebase.auth().signInWithCustomToken(data.customToken);
            // 成功表示
            document.getElementById("loadingState").classList.add("d-none");
            document.getElementById("successState").classList.remove("d-none");
            setTimeout(() => {
              location.href = "/index.html#/my-dashboard";
            }, 1500);
          } else {
            showInvalid(data.error || "LINE認証に失敗しました");
          }
        } catch (e) {
          showInvalid(`通信エラー: ${e.message}`);
        }
        return;
      }

      // ===== 通常の招待ページ表示処理 =====
      const token = params.get("token");

      if (!token) {
        showInvalid("招待トークンがありません");
        return;
      }

      try {
        // 招待情報を取得
        const infoRes = await fetch(`/api/auth/invite-info?token=${encodeURIComponent(token)}`);
        const info = await infoRes.json();

        if (!info.valid) {
          showInvalid(info.reason || "無効な招待リンクです");
          return;
        }

        // 有効な招待を表示
        document.getElementById("loadingState").classList.add("d-none");
        document.getElementById("validState").classList.remove("d-none");
        document.getElementById("staffName").textContent = info.staffName;

        // メールで参加ボタン: フォームトグル
        document.getElementById("btnAcceptEmail").addEventListener("click", () => {
          const form = document.getElementById("emailRegisterForm");
          const isHidden = form.classList.contains("d-none");
          form.classList.toggle("d-none", !isHidden);
          if (!isHidden) return;
          setTimeout(() => document.getElementById("registerEmail").focus(), 50);
        });

        // メール送信ボタン
        document.getElementById("btnSendRegisterEmail").addEventListener("click", async () => {
          const emailInput = document.getElementById("registerEmail");
          const sentEl = document.getElementById("registerEmailSent");
          const errorEl = document.getElementById("acceptError");
          const btnLabel = document.getElementById("registerEmailBtnLabel");
          const sendBtn = document.getElementById("btnSendRegisterEmail");
          const email = emailInput.value.trim();

          errorEl.classList.add("d-none");
          sentEl.classList.add("d-none");

          if (!email) {
            errorEl.textContent = "メールアドレスを入力してください";
            errorEl.classList.remove("d-none");
            return;
          }

          sendBtn.disabled = true;
          btnLabel.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

          try {
            // マジックリンクのURLに inviteToken も付与（受信ページで招待受諾処理）
            const redirectUrl = `${location.origin}/email-signin.html?inviteToken=${encodeURIComponent(token)}`;
            const actionCodeSettings = {
              url: redirectUrl,
              handleCodeInApp: true,
            };
            await auth.sendSignInLinkToEmail(email, actionCodeSettings);
            localStorage.setItem("emailForSignIn", email);
            sentEl.classList.remove("d-none");
          } catch (e) {
            const messages = {
              "auth/invalid-email": "メールアドレスの形式が正しくありません",
              "auth/operation-not-allowed": "メールリンク認証が無効です。Firebase ConsoleでEmail Link Sign-inを有効にしてください",
              "auth/too-many-requests": "送信回数が多すぎます",
            };
            errorEl.textContent = messages[e.code] || `送信失敗: ${e.message}`;
            errorEl.classList.remove("d-none");
          } finally {
            sendBtn.disabled = false;
            btnLabel.innerHTML = '<i class="bi bi-send"></i>';
          }
        });

        // LINEで参加ボタン: LINE OAuth2 フローを開始
        document.getElementById("btnAccept").addEventListener("click", () => {
          const channelId = window.LINE_LOGIN_CHANNEL_ID;
          if (!channelId) {
            const errorEl = document.getElementById("acceptError");
            errorEl.textContent = "LINE Login設定が未完了です。オーナーに確認してください。";
            errorEl.classList.remove("d-none");
            return;
          }

          // CSRF対策用 nonce を生成して localStorage に保存
          // (Android Chrome で LINE 認証後、新しいタブで開かれる場合があるため
          //  sessionStorage では失われる。有効期限 10 分)
          const nonce = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
          localStorage.setItem("inviteLineNonce", JSON.stringify({
            nonce,
            expiresAt: Date.now() + 10 * 60 * 1000,
          }));

          // state に inviteToken を含める（URLセーフ Base64 エンコード）
          const stateObj = JSON.stringify({ nonce, inviteToken: token });
          const stateB64 = btoa(stateObj).replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");

          const redirectUri = `${location.origin}/invite.html`;
          const lineParams = new URLSearchParams({
            response_type: "code",
            client_id: channelId,
            redirect_uri: redirectUri,
            state: stateB64,
            scope: "profile openid",
          });

          location.href = `https://access.line.me/oauth2/v2.1/authorize?${lineParams}`;
        });

      } catch (e) {
        showInvalid(`通信エラー: ${e.message}`);
      }

      function showInvalid(reason) {
        document.getElementById("loadingState").classList.add("d-none");
        document.getElementById("invalidState").classList.remove("d-none");
        if (reason) document.getElementById("invalidReason").textContent = reason;
      }
    })();
  </script>
</body>
</html>
