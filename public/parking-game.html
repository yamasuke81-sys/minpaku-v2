<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>駐車チャレンジ！</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #9bbc0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-wrapper {
      position: relative;
      width: 320px;
      height: 288px;
      border: 4px solid #0f380f;
      border-radius: 8px;
      overflow: hidden;
      background: #9bbc0f;
      image-rendering: pixelated;
    }

    canvas {
      display: block;
      width: 320px;
      height: 288px;
      image-rendering: pixelated;
    }

    #gameover-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      animation: flashWhite 0.5s ease-in-out 3;
    }

    @keyframes flashWhite {
      0%, 100% { background: #fff; }
      50% { background: #ffe0e0; }
    }

    #gameover-overlay .box {
      background: #cc0000;
      border: 4px solid #fff;
      padding: 18px 22px;
      text-align: center;
      color: #fff;
      font-family: monospace;
      max-width: 270px;
    }

    #gameover-overlay .go-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #fff;
      animation: blinkTitle 1.0s ease-in-out infinite;
    }

    @keyframes blinkTitle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #gameover-overlay .go-msg {
      font-size: 11px;
      font-weight: bold;
      line-height: 1.9;
      margin-bottom: 14px;
      color: #fff;
    }

    #clear-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(15, 56, 15, 0.93);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #clear-overlay .clear-box {
      background: #9bbc0f;
      border: 3px solid #0f380f;
      padding: 18px 22px;
      text-align: center;
      color: #0f380f;
      font-family: monospace;
      max-width: 280px;
    }

    #clear-overlay .clear-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #clear-overlay .clear-msg {
      font-size: 10px;
      line-height: 1.8;
      margin-bottom: 12px;
    }

    .btn {
      border: none;
      padding: 8px 20px;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      display: block;
      width: 100%;
      margin-top: 8px;
    }

    #gameover-overlay .retry-btn { background: #fff; color: #cc0000; }
    #clear-overlay .retry-btn    { background: #0f380f; color: #9bbc0f; }
    #gameover-overlay .proceed-btn { background: #fff; color: #cc0000; border: 2px solid #fff; }
    #clear-overlay .proceed-btn  { background: #0f380f; color: #9bbc0f; border: 2px solid #9bbc0f; }

    #start-text {
      margin-top: 12px;
      color: #0f380f;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="320" height="288"></canvas>

    <div id="gameover-overlay">
      <div class="box">
        <div class="go-title">⚠ 駐車違反 ⚠</div>
        <div class="go-msg">
          指定の場所以外への<br>
          駐車・立ち入りは<br>
          厳禁です。<br><br>
          近隣トラブル防止に<br>
          ご協力をお願いします。
        </div>
        <button class="btn retry-btn" onclick="restartGame()">もういちど</button>
        <div id="proceed-go" style="display:none;">
          <button class="btn proceed-btn" onclick="goToForm()">▶ 名簿記入へ進む</button>
        </div>
      </div>
    </div>

    <div id="clear-overlay">
      <div class="clear-box">
        <div class="clear-title">✓ 上手に駐車できました！</div>
        <div class="clear-msg">
          指定の場所以外への<br>
          駐車・立ち入りは厳禁です。<br>
          近隣トラブル防止に<br>
          ご協力をお願いします！
        </div>
        <button class="btn retry-btn" onclick="restartGame()">もういちど</button>
        <button class="btn proceed-btn" onclick="goToForm()">▶ 名簿記入へ進む</button>
      </div>
    </div>
  </div>
  <div id="start-text">タップ / スペースキー でレーン切り替え</div>

<script>
const CANVAS_W = 320;
const CANVAS_H = 288;
const GAME_DURATION = 25;

const COL_BG    = '#9bbc0f';
const COL_DARK  = '#0f380f';
const COL_MID   = '#306230';
const COL_LIGHT = '#8bac0f';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ===== レイアウト定義 =====
// 俯瞰の駐車場（現実の配置に近づける）
//
//  y=130〜148: 隣家の庭エリア（上の境界）
//  y=148〜186: 上レーン（車道）
//  y=186〜192: 中央白線
//  y=192〜228: 下レーン（車道）
//  y=228〜240: 縁石・路肩
//
// 車は左端固定、駐車場が右→左にスクロール

const LANE_Y    = [167, 210]; // 各レーンの中心Y
const CAR_X     = 55;
const CAR_W     = 28;
const CAR_H     = 20;
const ZONE_W    = 54;
const ZONE_H_UP = 38;  // 上レーンゾーン高さ
const ZONE_H_DN = 36;  // 下レーンゾーン高さ

// ===== 状態 =====
let gameState = 'title';
let currentLane = 1;
let score = 0;
let timeLeft = GAME_DURATION;
let frameCount = 0;
let bgOffset = 0;
let scrollSpeed = 2.0;
let spawnTimer = 0;
let zones = [];
let particles = [];
let playCount = 0;
let gameOverCount = 0;
let canProceed = false;
let gameOverReady = false;
let parkingCount = 0;
let shakeTimer = 0;
let patternIdx = 0;

// ===== 描画ユーティリティ =====
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// ===== 駐車場背景 =====
function drawParkingLot() {
  // アスファルト全体
  drawRect(0, 130, CANVAS_W, CANVAS_H - 130, '#1e3a1e');

  // === 隣家エリア（上） ===
  drawRect(0, 130, CANVAS_W, 18, COL_DARK);
  drawRect(0, 131, CANVAS_W, 16, '#143214');
  // 庭の草・植木（スクロール）
  ctx.save();
  ctx.globalAlpha = 1.0;
  for (let x = (-bgOffset % 44); x < CANVAS_W; x += 44) {
    ctx.font = '11px serif';
    ctx.fillText('🌳', x + 2, 145);
    ctx.fillText('🌷', x + 22, 145);
  }
  ctx.restore();
  // 境界ブロック（縁石）
  drawRect(0, 146, CANVAS_W, 4, COL_DARK);
  for (let x = (-bgOffset % 20); x < CANVAS_W; x += 20) {
    drawRect(x, 146, 10, 4, COL_MID);
  }

  // === 上レーン ===
  drawRect(0, 150, CANVAS_W, 36, '#2a4a2a');

  // === 中央区切り（二重白線） ===
  drawRect(0, 186, CANVAS_W, 6, COL_DARK);
  for (let x = (-bgOffset % 22); x < CANVAS_W; x += 22) {
    drawRect(x, 187, 14, 2, COL_LIGHT);
    drawRect(x, 190, 14, 2, COL_LIGHT);
  }

  // === 下レーン ===
  drawRect(0, 192, CANVAS_W, 36, '#2a4a2a');

  // === 縁石（下） ===
  drawRect(0, 228, CANVAS_W, 5, COL_DARK);
  for (let x = (-bgOffset % 20); x < CANVAS_W; x += 20) {
    drawRect(x, 228, 10, 5, COL_MID);
  }

  // === 路肩・地面 ===
  drawRect(0, 233, CANVAS_W, CANVAS_H - 233, COL_MID);

  // 車が走っているレーンに薄い影
  const laneY = currentLane === 0 ? 150 : 192;
  drawRect(0, laneY, CANVAS_W, 36, 'rgba(255,255,180,0.04)');
}

// ===== ゾーン描画 =====
function drawZone(z) {
  const isUp = z.lane === 0;
  const zy  = isUp ? 150 : 192;
  const zh  = isUp ? 36 : 36;
  const zx  = z.x;

  ctx.save();
  ctx.globalAlpha = 1.0;

  if (z.type === 'parking') {
    // 指定駐車枠（白線の四角）
    drawRect(zx, zy, ZONE_W, zh, '#253525');
    // 枠線
    ctx.strokeStyle = COL_LIGHT;
    ctx.lineWidth = 2;
    ctx.strokeRect(zx + 1, zy + 1, ZONE_W - 2, zh - 2);
    // Pマーク
    ctx.fillStyle = COL_LIGHT;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('P', zx + ZONE_W / 2, zy + zh - 8);

  } else if (z.type === 'garden') {
    // 隣の家の庭（侵入禁止）
    drawRect(zx, zy, ZONE_W, zh, '#143214');
    // 縁石ライン
    drawRect(zx, zy, ZONE_W, 3, COL_DARK);
    drawRect(zx, zy + zh - 3, ZONE_W, 3, COL_DARK);
    ctx.font = '15px serif';
    ctx.textAlign = 'center';
    ctx.fillText('🌳', zx + ZONE_W / 2 - 10, zy + zh - 6);
    ctx.fillText('🌷', zx + ZONE_W / 2 + 8, zy + zh - 6);

  } else if (z.type === 'forbidden') {
    // 進入禁止エリア
    drawRect(zx, zy, ZONE_W, zh, COL_DARK);
    drawRect(zx + 2, zy + 2, ZONE_W - 4, zh - 4, '#1a1a1a');
    // 斜線
    ctx.strokeStyle = '#cc0000';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(zx + 4, zy + 4);
    ctx.lineTo(zx + ZONE_W - 4, zy + zh - 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(zx + ZONE_W - 4, zy + 4);
    ctx.lineTo(zx + 4, zy + zh - 4);
    ctx.stroke();
    ctx.fillStyle = '#cc0000';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('進入禁止', zx + ZONE_W / 2, zy + zh / 2 + 3);

  } else if (z.type === 'turn') {
    // 転回エリア
    drawRect(zx, zy, ZONE_W, zh, COL_LIGHT);
    drawRect(zx + 2, zy + 2, ZONE_W - 4, zh - 4, COL_BG);
    ctx.fillStyle = COL_DARK;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('転回', zx + ZONE_W / 2, zy + 14);
    ctx.font = '16px monospace';
    ctx.fillText('↺', zx + ZONE_W / 2, zy + zh - 6);
  }

  ctx.textAlign = 'left';
  ctx.restore();
}

// ===== 車描画（俯瞰・右向き） =====
function drawCar(x, laneIdx) {
  const cy = LANE_Y[laneIdx] - CAR_H / 2;
  // 車体
  drawRect(x, cy, CAR_W, CAR_H, COL_DARK);
  drawRect(x + 2, cy + 2, CAR_W - 4, CAR_H - 4, COL_LIGHT);
  // フロント（右）
  drawRect(x + CAR_W - 7, cy + 4, 5, CAR_H - 8, COL_MID);
  // タイヤ4つ
  drawRect(x + 3,          cy,             5, 4, COL_DARK);
  drawRect(x + 3,          cy + CAR_H - 4, 5, 4, COL_DARK);
  drawRect(x + CAR_W - 8, cy,             5, 4, COL_DARK);
  drawRect(x + CAR_W - 8, cy + CAR_H - 4, 5, 4, COL_DARK);
}

// ===== スポーンパターン（現実の駐車場に近い配置） =====
// [上レーン, 下レーン]
// 実際の配置想定：
// - 物件の駐車枠は道路に対して垂直に並ぶ
// - 隣家の庭は奥（上）に位置
// - 進入禁止は他人の区画
// - 転回スペースは端に
const PATTERNS = [
  ['parking',   'garden'],    // 正しい枠(上) vs 隣の庭(下)
  ['garden',    'parking'],   // 隣の庭(上) vs 正しい枠(下)
  ['parking',   'forbidden'], // 正しい枠(上) vs 進入禁止(下)
  ['forbidden', 'parking'],   // 進入禁止(上) vs 正しい枠(下)
  ['turn',      'parking'],   // 転回エリア(上) vs 正しい枠(下)
  ['parking',   'turn'],      // 正しい枠(上) vs 転回エリア(下)
  ['turn',      'forbidden'], // 転回ボーナス(上) vs 進入禁止(下)
  ['garden',    'turn'],      // 隣の庭(上) vs 転回ボーナス(下)
  ['forbidden', 'garden'],    // 進入禁止(上) vs 隣の庭(下) ← どちらも危険！急いでタイミングを外す
];

function spawnPair() {
  const pat = PATTERNS[patternIdx % PATTERNS.length];
  patternIdx++;
  for (let lane = 0; lane < 2; lane++) {
    zones.push({ x: CANVAS_W + 8, lane, type: pat[lane], scored: false });
  }
}

// ===== パーティクル =====
function spawnParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 14
    });
  }
}

// ===== タップ処理 =====
function handleTap() {
  if (gameState === 'title') { startGame(); return; }
  if (gameState === 'gameover' && gameOverReady) {
    document.getElementById('proceed-go').style.display = canProceed ? 'block' : 'none';
    document.getElementById('gameover-overlay').style.display = 'flex';
    return;
  }
  if (gameState !== 'playing') return;
  // レーン切り替え
  currentLane = currentLane === 0 ? 1 : 0;
  playTapSound();
}

function startGame() {
  playCount++;
  gameState = 'playing';
  currentLane = 1;
  score = 0;
  timeLeft = GAME_DURATION;
  frameCount = 0;
  bgOffset = 0;
  spawnTimer = 0;
  zones = [];
  particles = [];
  parkingCount = 0;
  shakeTimer = 0;
  gameOverReady = false;
  patternIdx = Math.floor(Math.random() * PATTERNS.length);
  // 初回: 最初から速くして必ず失敗させる
  scrollSpeed = playCount === 1 ? 3.2 : 1.8;
  document.getElementById('gameover-overlay').style.display = 'none';
  document.getElementById('clear-overlay').style.display = 'none';
}

function restartGame() { startGame(); }
function goToForm()    { window.location.href = '/guest-form.html'; }

function gameOver() {
  gameState = 'gameover';
  gameOverCount++;
  if (gameOverCount >= 3) canProceed = true;
  gameOverReady = false;
  shakeTimer = 12;
  playBuzzer();
  setTimeout(() => { gameOverReady = true; }, 1200);
}

function gameClear() {
  gameState = 'clear';
  canProceed = true;
  document.getElementById('clear-overlay').style.display = 'flex';
}

// ===== メインループ =====
let lastTime = 0, accumulator = 0;
const TICK = 1000 / 30;

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  accumulator += ts - lastTime;
  lastTime = ts;
  while (accumulator >= TICK) { update(); accumulator -= TICK; }
  draw();
  requestAnimationFrame(gameLoop);
}

function update() {
  frameCount++;
  if (gameState === 'title') return;
  if (gameState !== 'playing') {
    for (const p of particles) { p.x += p.vx; p.y += p.vy; p.life--; }
    particles = particles.filter(p => p.life > 0);
    if (shakeTimer > 0) shakeTimer--;
    return;
  }

  // タイマー
  if (frameCount % 30 === 0) {
    timeLeft--;
    if (timeLeft <= 0) {
      if (parkingCount >= 3) gameClear();
      else gameOver();
      return;
    }
  }

  const elapsed = GAME_DURATION - timeLeft;

  // スクロール速度（5秒から加速）
  if (playCount === 1) {
    scrollSpeed = 3.2 + elapsed * 0.10;
  } else {
    if (elapsed < 5)       scrollSpeed = 1.8;
    else if (elapsed < 12) scrollSpeed = 2.4 + (elapsed - 5) * 0.12;
    else                   scrollSpeed = 3.3 + (elapsed - 12) * 0.08;
  }
  bgOffset += scrollSpeed;

  // スポーン
  spawnTimer++;
  const interval = playCount === 1 ? 52 : 68;
  if (spawnTimer >= interval) { spawnPair(); spawnTimer = 0; }

  // ゾーン更新・判定
  for (const z of zones) {
    z.x -= scrollSpeed;

    const overlap = (CAR_X + CAR_W - 6) > z.x && (CAR_X + 6) < (z.x + ZONE_W);

    if (overlap && z.lane === currentLane && !z.scored) {
      z.scored = true;
      if (z.type === 'parking') {
        score += 20;
        parkingCount++;
        spawnParticles(CAR_X + CAR_W / 2, LANE_Y[currentLane]);
        playParkingSound();
      } else if (z.type === 'turn') {
        score += 10;
        spawnParticles(CAR_X + CAR_W / 2, LANE_Y[currentLane]);
        playTapSound();
      } else if (z.type === 'garden' || z.type === 'forbidden') {
        gameOver();
        return;
      }
    }
  }

  zones = zones.filter(z => z.x > -ZONE_W - 10);

  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.life--; }
  particles = particles.filter(p => p.life > 0);

  if (shakeTimer > 0) shakeTimer--;

  // 早期クリア（駐車5回）
  if (parkingCount >= 5) gameClear();
}

// ===== 描画 =====
function draw() {
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3);
  }

  ctx.fillStyle = COL_BG;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (gameState === 'title') { drawTitle(); ctx.restore(); return; }

  drawParkingLot();

  // ゾーン
  for (const z of zones) drawZone(z);

  // 車
  drawCar(CAR_X, currentLane);

  // パーティクル
  for (const p of particles) drawRect(p.x, p.y, 3, 3, COL_LIGHT);

  // HUD
  ctx.save();
  ctx.globalAlpha = 1.0;
  ctx.fillStyle = COL_DARK;
  ctx.font = 'bold 10px monospace';
  ctx.fillText(`残り ${timeLeft}秒`, 10, 22);
  ctx.fillText(`${score}pt`, 10, 36);
  ctx.fillText(`駐車: ${parkingCount}/3`, 220, 22);
  ctx.restore();

  // ゲームオーバー中の表示
  if (gameState === 'gameover') {
    ctx.textAlign = 'center';
    if (frameCount % 50 < 35) {
      drawRect(0, 46, CANVAS_W, 28, COL_DARK);
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 15px monospace';
      ctx.fillText('⚠ 駐車違反 ⚠', CANVAS_W / 2, 66);
    }
    if (gameOverReady && frameCount % 50 < 35) {
      drawRect(0, CANVAS_H - 36, CANVAS_W, 24, COL_DARK);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('タップしてください', CANVAS_W / 2, CANVAS_H - 19);
    }
    ctx.textAlign = 'left';
  }

  ctx.restore();
}

function drawTitle() {
  ctx.fillStyle = COL_DARK;
  ctx.font = 'bold 17px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('駐車チャレンジ！', CANVAS_W / 2, 62);
  ctx.font = '9px monospace';
  ctx.fillStyle = COL_MID;
  ctx.fillText('〜 正しい場所に駐車せよ 〜', CANVAS_W / 2, 80);

  // ミニ駐車場イメージ
  const mx = 30, my = 95;
  drawRect(mx, my, 260, 90, '#1e3a1e');
  // 隣家の庭
  drawRect(mx, my, 260, 14, '#143214');
  ctx.globalAlpha = 1.0;
  ctx.font = '10px serif';
  ctx.fillText('🌳🌷🌳🌷🌳🌷🌳🌷🌳🌷🌳', mx + 2, my + 11);
  // 縁石
  drawRect(mx, my + 14, 260, 3, COL_DARK);
  // 上レーン（駐車枠+庭）
  drawRect(mx, my + 17, 260, 30, '#2a4a2a');
  // 駐車枠
  ctx.strokeStyle = COL_LIGHT; ctx.lineWidth = 1.5;
  ctx.strokeRect(mx + 5, my + 18, 45, 28);
  ctx.strokeRect(mx + 55, my + 18, 45, 28);
  ctx.fillStyle = COL_LIGHT; ctx.font = 'bold 14px monospace';
  ctx.fillText('P', mx + 22, my + 37);
  ctx.fillText('P', mx + 72, my + 37);
  // 進入禁止
  drawRect(mx + 105, my + 17, 45, 30, COL_DARK);
  ctx.fillStyle = '#cc0000'; ctx.font = 'bold 7px monospace';
  ctx.fillText('進入禁止', mx + 108, my + 35);
  // 隣の庭ゾーン
  drawRect(mx + 155, my + 17, 45, 30, '#143214');
  ctx.font = '12px serif';
  ctx.fillText('🌳🌷', mx + 158, my + 38);
  // 中央白線
  drawRect(mx, my + 47, 260, 4, COL_DARK);
  // 下レーン（転回+駐車枠）
  drawRect(mx, my + 51, 260, 30, '#2a4a2a');
  drawRect(mx + 5, my + 51, 45, 28, COL_LIGHT);
  ctx.fillStyle = COL_DARK; ctx.font = 'bold 7px monospace';
  ctx.fillText('転回↺', mx + 14, my + 68);
  ctx.strokeStyle = COL_LIGHT;
  ctx.strokeRect(mx + 60, my + 52, 45, 26);
  ctx.fillStyle = COL_LIGHT; ctx.font = 'bold 14px monospace';
  ctx.fillText('P', mx + 77, my + 71);
  // 車
  drawCar(mx + 170, 0);

  ctx.fillStyle = COL_DARK;
  ctx.font = '9px monospace';
  ctx.fillText('タップでレーン切り替え', CANVAS_W / 2, 204);
  ctx.fillText('[P]に入ると駐車成功！', CANVAS_W / 2, 218);
  ctx.fillText('庭・進入禁止はアウト！', CANVAS_W / 2, 232);
  ctx.fillText('転回エリアはボーナス', CANVAS_W / 2, 246);

  if (frameCount % 50 < 35) {
    ctx.fillStyle = COL_DARK;
    ctx.font = 'bold 12px monospace';
    ctx.fillText('タップでスタート', CANVAS_W / 2, 272);
  }
  ctx.textAlign = 'left';
}

// ===== サウンド =====
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBuzzer() {
  try {
    const ac = getAC(), osc = ac.createOscillator(), gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square'; osc.frequency.value = 200;
    const t = ac.currentTime;
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.setValueAtTime(0, t + 0.15);
    gain.gain.setValueAtTime(0.12, t + 0.2);
    gain.gain.setValueAtTime(0, t + 0.38);
    osc.start(t); osc.stop(t + 0.4);
  } catch(e) {}
}

function playTapSound() {
  try {
    const ac = getAC(), osc = ac.createOscillator(), gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square'; osc.frequency.value = 600;
    gain.gain.value = 0.04;
    const t = ac.currentTime;
    osc.start(t); osc.stop(t + 0.04);
  } catch(e) {}
}

function playParkingSound() {
  try {
    const ac = getAC(), osc = ac.createOscillator(), gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square';
    const t = ac.currentTime;
    osc.frequency.setValueAtTime(440, t);
    osc.frequency.setValueAtTime(660, t + 0.08);
    gain.gain.setValueAtTime(0.06, t);
    gain.gain.setValueAtTime(0, t + 0.22);
    osc.start(t); osc.stop(t + 0.25);
  } catch(e) {}
}

// ===== 入力 =====
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleTap(); }, { passive: false });
canvas.addEventListener('click', () => handleTap());
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') {
    e.preventDefault(); handleTap();
  }
});

requestAnimationFrame(gameLoop);
</script>
