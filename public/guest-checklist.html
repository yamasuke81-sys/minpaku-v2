<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヘルパー用 清掃チェックリスト</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  body { background:#f8fafc; padding-bottom:90px; }
  .header-bar {
    position:sticky; top:0; z-index:30;
    background: linear-gradient(135deg, #ff7a18 0%, #ff5e62 25%, #af3fff 55%, #2196f3 100%);
    color:#fff; padding:10px 16px; box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .header-bar h1 { font-size:1.05rem; margin:0; font-weight:700; }
  .container { max-width:760px; padding:0 10px; }

  .area-tabs {
    position:sticky; top:88px; z-index:20;
    background:#fff; padding:8px 4px; border-bottom:1px solid #e2e8f0;
    overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch;
  }
  .area-tabs .area-tab {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 14px; margin-right:6px; border-radius:999px;
    background:#f1f5f9; color:#475569; border:1px solid #e2e8f0;
    cursor:pointer; font-size:0.9rem; font-weight:500;
  }
  .area-tabs .area-tab.active { background:#3b82f6; color:#fff; border-color:#3b82f6; }
  .area-tabs .area-tab .tab-count { font-size:0.75rem; opacity:0.85; }
  .area-tabs .area-tab.all-done { background:#22c55e; color:#fff; border-color:#22c55e; }

  .area-controls { padding:8px 4px; display:flex; gap:6px; flex-wrap:wrap; }

  .gc-item {
    background:#fff; border:1px solid #e2e8f0; border-radius:10px;
    padding:12px 14px; margin-bottom:8px; display:flex; gap:12px;
    cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
    transition:background 0.1s, opacity 0.15s;
  }
  .gc-item.checked { background:#f0fdf4; border-color:#bbf7d0; }
  .gc-item.checked .gc-item-name { color:#94a3b8; text-decoration:line-through; }
  .gc-item.busy { opacity:0.55; pointer-events:none; }
  .gc-checkbox {
    flex-shrink:0; width:24px; height:24px; border:2px solid #cbd5e1; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    background:#fff; margin-top:2px; transition:all 0.15s;
  }
  .gc-item.checked .gc-checkbox { background:#22c55e; border-color:#22c55e; }
  .gc-checkbox i { color:#fff; font-size:0.95rem; opacity:0; }
  .gc-item.checked .gc-checkbox i { opacity:1; }
  .gc-item-body { flex-grow:1; min-width:0; }
  .gc-item-name { font-size:0.95rem; line-height:1.4; }
  .gc-item-memo { font-size:0.8rem; color:#64748b; margin-top:4px; }
  .gc-item-checkedby { font-size:0.72rem; color:#64748b; margin-top:4px; }
  .gc-supply-row {
    margin-top:8px; padding-top:8px; border-top:1px dashed #fde68a;
    display:flex; align-items:center; gap:8px;
  }
  .gc-supply-row label { color:#b45309; font-size:0.85rem; cursor:pointer; margin:0; }

  /* インライン見本写真サムネ (item 内) */
  .gc-thumbs { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .gc-thumb-wrap { position:relative; display:inline-block; }
  .gc-thumb {
    width:64px; height:64px; object-fit:cover; border-radius:6px;
    border:1px solid #e2e8f0; cursor:zoom-in; display:block;
  }
  .gc-thumb-extra {
    position:absolute; inset:0; background:rgba(0,0,0,0.55); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px; border-radius:6px; pointer-events:none;
  }

  .gc-cat { margin-bottom:8px; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; background:#fff; }
  .gc-cat-header {
    display:flex; align-items:center; padding:10px 14px;
    background:#f8fafc; cursor:pointer; user-select:none;
    font-weight:600; font-size:0.95rem;
  }
  .gc-cat-header.all-done { background:#dcfce7; color:#166534; }
  .gc-cat-header .gc-cat-toggle { margin-left:auto; transition:transform 0.2s; }
  .gc-cat.collapsed .gc-cat-toggle { transform:rotate(-90deg); }
  .gc-cat-body { padding:8px 10px 4px; }
  .gc-cat.collapsed .gc-cat-body { display:none; }
  .gc-cat-badge {
    background:#94a3b8; color:#fff; border-radius:999px;
    padding:1px 8px; font-size:0.7rem; font-weight:600; margin-left:8px;
  }
  .gc-cat-header.all-done .gc-cat-badge { background:#16a34a; }

  .progress-fixed {
    position:fixed; bottom:0; left:0; right:0; background:#fff;
    padding:10px 16px; box-shadow:0 -2px 8px rgba(0,0,0,0.1); z-index:25;
  }
  .progress-fixed .progress { height:8px; }

  .empty-state, .loading { padding:40px 20px; text-align:center; color:#64748b; }

  /* 上位タブ (チェックリスト / 見本写真) */
  .top-tabs {
    position:sticky; top:42px; z-index:21;
    display:flex; gap:6px; padding:8px 10px 0; background:#fff;
  }
  .top-tab {
    flex:1; padding:8px 6px; border:1px solid #dee2e6; border-bottom:none;
    background:#f8fafc; color:#475569; font-weight:600; font-size:0.9rem;
    border-radius:8px 8px 0 0; cursor:pointer; text-align:center;
  }
  .top-tab.active { background:#2c3e50; color:#fff; border-color:#2c3e50; }

  /* 見本写真グリッド */
  .photo-section .photo-group { margin-bottom:16px; }
  .photo-section .photo-label { font-size:0.78rem; color:#64748b; margin-bottom:4px; }
  .photo-section .photo-grid { display:flex; flex-wrap:wrap; gap:6px; }
  .photo-section .photo-thumb {
    width:100px; height:100px; object-fit:cover; border-radius:8px;
    border:1px solid #e2e8f0; cursor:pointer;
  }
  .lightbox-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    user-select:none;
  }
  .lightbox-overlay img { max-width:95vw; max-height:75vh; border-radius:8px; object-fit:contain; }
  .lightbox-close {
    position:absolute; top:12px; right:16px; background:none; border:none;
    color:#fff; font-size:2rem; cursor:pointer;
  }
  .lightbox-controls { display:flex; align-items:center; gap:16px; margin-top:12px; }
  .lightbox-btn {
    background:rgba(255,255,255,0.15); border:none; color:#fff;
    font-size:1.4rem; border-radius:50%; width:44px; height:44px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .lightbox-counter { color:#fff; font-size:13px; min-width:50px; text-align:center; }
  .lightbox-label { color:#ccc; font-size:12px; margin-bottom:8px; max-width:90vw; text-align:center; }
  .toast-fixed {
    position:fixed; top:60px; left:50%; transform:translateX(-50%);
    background:#1e293b; color:#fff; padding:8px 14px; border-radius:8px;
    font-size:0.85rem; z-index:50; opacity:0; transition:opacity 0.2s;
    pointer-events:none;
  }
  .toast-fixed.show { opacity:1; }
</style>
</head>
<body>

<div class="header-bar">
  <h1><i class="bi bi-clipboard-check"></i> <span id="propName">清掃チェックリスト</span></h1>
</div>

<div id="topTabs" class="top-tabs d-none">
  <div class="top-tab active" data-top-tab="checklist"><i class="bi bi-check2-square"></i> チェックリスト</div>
  <div class="top-tab" data-top-tab="photos"><i class="bi bi-camera"></i> 見本写真 <span id="photoCount" class="badge bg-secondary" style="font-size:0.65rem;"></span></div>
</div>

<div id="areaTabs" class="area-tabs d-none"></div>

<div class="container pt-2">
  <div id="content" class="loading">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2">読み込み中...</div>
  </div>
</div>

<div class="progress-fixed d-none" id="progressBar">
  <div class="d-flex align-items-center mb-1">
    <span class="small fw-bold flex-grow-1"><span id="checkedCount">0</span> / <span id="totalCount">0</span> 完了</span>
    <span class="small text-muted" id="liveStatus"><i class="bi bi-broadcast"></i> 同期中</span>
  </div>
  <div class="progress">
    <div class="progress-bar bg-success" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div id="toast" class="toast-fixed"></div>

<script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=0504e"></script>
<script>
(function() {
  const API_BASE = "https://api-5qrfx7ujcq-an.a.run.app";

  const params = new URLSearchParams(location.search);
  const propertyId = params.get("p") || "";
  const propertyName = params.get("n") || "";
  if (propertyName) document.getElementById("propName").textContent = propertyName;

  const content = document.getElementById("content");
  const areaTabsEl = document.getElementById("areaTabs");
  const topTabsEl = document.getElementById("topTabs");
  const photoCountEl = document.getElementById("photoCount");
  let activeTopTab = "checklist"; // "checklist" | "photos"
  const progressBar = document.getElementById("progressBar");
  const checkedCountEl = document.getElementById("checkedCount");
  const totalCountEl = document.getElementById("totalCount");
  const progressFill = document.getElementById("progressFill");
  const liveStatus = document.getElementById("liveStatus");
  const toastEl = document.getElementById("toast");

  // UI preference (折りたたみ状態) のみ localStorage に保持
  const COLLAPSED_KEY = `helperChecklistCollapsed_${propertyId}`;
  let collapsedSet = new Set();
  try {
    const c = localStorage.getItem(COLLAPSED_KEY);
    if (c) collapsedSet = new Set(JSON.parse(c));
  } catch (e) {}
  const saveCollapsed = () => { try { localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...collapsedSet])); } catch (e) {} };

  let checklistId = null;
  let areas = [];
  let itemStates = {}; // サーバーから受信した最新状態
  let activeAreaId = null;
  let pendingItems = new Set(); // 送信中の itemId

  function esc(s) {
    return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }
  function showToast(msg, ms=1800) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), ms);
  }
  function fmtTime(ms) {
    if (!ms) return "";
    const d = new Date(ms);
    const pad = n => String(n).padStart(2, "0");
    return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function getSortedChildren(node) {
    const items = (node.directItems || node.items || []).map(it => ({
      kind: "item", sortOrder: it.sortOrder || 0, data: it,
    }));
    const catField = node.taskTypes ? "taskTypes"
                  : node.subCategories ? "subCategories"
                  : node.subSubCategories ? "subSubCategories"
                  : null;
    const cats = catField ? (node[catField] || []).map(c => ({
      kind: "cat", sortOrder: c.sortOrder || 0, data: c,
    })) : [];
    return [...items, ...cats].sort((a, b) => a.sortOrder - b.sortOrder);
  }

  function countItems(node) {
    let n = 0;
    const walk = (x) => {
      (x.directItems || x.items || []).forEach(() => n++);
      (x.taskTypes || []).forEach(walk);
      (x.subCategories || []).forEach(walk);
      (x.subSubCategories || []).forEach(walk);
    };
    walk(node);
    return n;
  }
  function countChecked(node) {
    let n = 0;
    const walk = (x) => {
      (x.directItems || x.items || []).forEach(it => { if (itemStates[it.id]?.checked) n++; });
      (x.taskTypes || []).forEach(walk);
      (x.subCategories || []).forEach(walk);
      (x.subSubCategories || []).forEach(walk);
    };
    walk(node);
    return n;
  }

  // item に紐づく見本写真 URL の配列を返す
  function itemSampleUrls(it) {
    const out = [];
    const imgs = it.sampleImages || [];
    imgs.forEach(i => { if (i?.url) out.push(i.url); });
    if (out.length === 0 && it.sampleImageUrl) out.push(it.sampleImageUrl);
    return out;
  }

  function renderItem(it) {
    const st = itemStates[it.id] || {};
    const checked = !!st.checked;
    const busy = pendingItems.has(it.id);
    const memo = it.memo ? `<div class="gc-item-memo">${esc(it.memo)}</div>` : "";
    const checkedBy = (checked && st.checkedBy)
      ? `<div class="gc-item-checkedby"><i class="bi bi-check-circle"></i> ${esc(st.checkedBy.name||"")} ${fmtTime(st.checkedBy.at || (st.checkedAt?.toMillis?.() || 0))}</div>`
      : "";
    // 最大 2 枚の見本写真サムネ。3 枚以上ある場合は 2 枚目に "+N" オーバーレイ
    let thumbs = "";
    const urls = itemSampleUrls(it);
    if (urls.length > 0) {
      const MAX = 2;
      const visible = urls.slice(0, MAX);
      const extra = Math.max(0, urls.length - MAX);
      const allUrlsJson = esc(JSON.stringify(urls));
      thumbs = `<div class="gc-thumbs" data-stop="1">` + visible.map((u, i) => {
        const overlay = (i === MAX - 1 && extra > 0)
          ? `<div class="gc-thumb-extra">+${extra}</div>` : "";
        return `<div class="gc-thumb-wrap">
          <img src="${esc(u)}" loading="lazy" class="gc-thumb"
               data-thumb-url="${esc(u)}"
               data-thumb-label="${esc(it.name)}"
               data-thumb-all="${allUrlsJson}"
               data-thumb-idx="${i}">
          ${overlay}
        </div>`;
      }).join("") + `</div>`;
    }
    const supply = it.supplyItem ? `
      <div class="gc-supply-row" data-stop="1">
        <input class="form-check-input gc-restock" type="checkbox" id="sup-${esc(it.id)}" data-restock-id="${esc(it.id)}"
               ${st.needsRestock ? "checked" : ""} style="width:18px;height:18px;margin:0;">
        <label for="sup-${esc(it.id)}"><i class="bi bi-exclamation-triangle"></i> 要補充</label>
      </div>
    ` : "";
    return `
      <div class="gc-item${checked ? " checked" : ""}${busy ? " busy" : ""}" data-item-id="${esc(it.id)}">
        <div class="gc-checkbox"><i class="bi bi-check-lg"></i></div>
        <div class="gc-item-body">
          <div class="gc-item-name">${esc(it.name)}</div>
          ${memo}
          ${thumbs}
          ${checkedBy}
          ${supply}
        </div>
      </div>
    `;
  }

  function renderCat(cat) {
    const total = countItems(cat);
    const done = countChecked(cat);
    const allDone = total > 0 && done === total;
    const isCollapsed = collapsedSet.has(cat.id);
    const children = getSortedChildren(cat);
    return `
      <div class="gc-cat${isCollapsed ? " collapsed" : ""}" data-cat-id="${esc(cat.id)}">
        <div class="gc-cat-header${allDone ? " all-done" : ""}" data-cat-toggle="${esc(cat.id)}">
          <span>${esc(cat.name)}</span>
          <span class="gc-cat-badge">${done}/${total}</span>
          <span class="gc-cat-toggle"><i class="bi bi-chevron-down"></i></span>
        </div>
        <div class="gc-cat-body">
          ${children.map(c => c.kind === "item" ? renderItem(c.data) : renderCat(c.data)).join("")}
        </div>
      </div>
    `;
  }

  function renderArea(area) {
    const children = getSortedChildren(area);
    return `
      <div class="area-controls">
        <button type="button" class="btn btn-sm btn-outline-secondary" id="btnToggleAllExpand">
          <i class="bi bi-arrows-expand"></i> 全展開/折りたたみ
        </button>
      </div>
      ${children.map(c => c.kind === "item" ? renderItem(c.data) : renderCat(c.data)).join("")}
    `;
  }

  function renderTabs() {
    areaTabsEl.innerHTML = areas.map(a => {
      const total = countItems(a);
      const done = countChecked(a);
      const allDone = total > 0 && done === total;
      const active = a.id === activeAreaId;
      return `<span class="area-tab${active ? ' active' : ''}${allDone && !active ? ' all-done' : ''}" data-area-id="${esc(a.id)}">
        ${esc(a.name)} <span class="tab-count">${done}/${total}</span>
      </span>`;
    }).join("");
    areaTabsEl.classList.remove("d-none");
    areaTabsEl.querySelectorAll(".area-tab").forEach(t => {
      t.addEventListener("click", () => {
        activeAreaId = t.dataset.areaId;
        renderActiveArea();
        renderTabs();
        t.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      });
    });
  }

  function renderActiveArea() {
    const area = areas.find(a => a.id === activeAreaId);
    if (!area) return;
    content.className = "";
    content.innerHTML = renderArea(area);
    wireArea(area);
  }

  // === 見本写真の収集 (templateSnapshot 内の sampleImages / sampleImageUrl を再帰探索) ===
  function collectSamples() {
    const all = [];
    const walk = (node, pathParts) => {
      const imgs = node.sampleImages || [];
      if (!imgs.length && node.sampleImageUrl) {
        all.push({ label: pathParts.join(" › "), url: node.sampleImageUrl });
      }
      imgs.forEach(img => {
        all.push({ label: pathParts.join(" › "), url: img.url });
      });
      (node.taskTypes || []).forEach(c => walk(c, [...pathParts, c.name]));
      (node.subCategories || []).forEach(c => walk(c, [...pathParts, c.name]));
      (node.subSubCategories || []).forEach(c => walk(c, [...pathParts, c.name]));
      [...(node.directItems || []), ...(node.items || [])].forEach(it => {
        const itImgs = it.sampleImages || [];
        if (!itImgs.length && it.sampleImageUrl) {
          all.push({ label: [...pathParts, it.name].join(" › "), url: it.sampleImageUrl });
        }
        itImgs.forEach(img => {
          all.push({ label: [...pathParts, it.name].join(" › "), url: img.url });
        });
      });
    };
    areas.forEach(a => walk(a, [a.name]));
    return all;
  }

  function renderPhotos() {
    const samples = collectSamples();
    if (samples.length === 0) {
      content.className = "empty-state";
      content.innerHTML = `<i class="bi bi-camera fs-1 text-muted"></i><p class="mt-2">見本写真は登録されていません</p>`;
      return;
    }
    // 連続する同一ラベルをグループ化
    const grouped = [];
    samples.forEach(s => {
      const last = grouped[grouped.length - 1];
      if (last && last.label === s.label) last.urls.push(s.url);
      else grouped.push({ label: s.label, urls: [s.url] });
    });
    content.className = "photo-section";
    content.innerHTML = grouped.map(g => `
      <div class="photo-group">
        <div class="photo-label">${esc(g.label)}</div>
        <div class="photo-grid">
          ${g.urls.map(u => `<img class="photo-thumb" src="${esc(u)}" loading="lazy" data-url="${esc(u)}" data-label="${esc(g.label)}">`).join("")}
        </div>
      </div>
    `).join("");
    // ライトボックス
    const allUrls = samples.map(s => s.url);
    const allLabels = samples.map(s => s.label);
    content.querySelectorAll(".photo-thumb").forEach((img, idx) => {
      img.addEventListener("click", () => openLightbox(allUrls, allLabels, samples.findIndex(s => s.url === img.dataset.url)));
    });
  }

  function openLightbox(urls, labels, startIdx) {
    const ex = document.getElementById("gcLightbox");
    if (ex) ex.remove();
    let cur = startIdx;
    const total = urls.length;
    const overlay = document.createElement("div");
    overlay.id = "gcLightbox";
    overlay.className = "lightbox-overlay";
    overlay.innerHTML = `
      <button class="lightbox-close" id="gcLbClose">&times;</button>
      <div class="lightbox-label" id="gcLbLabel"></div>
      <img id="gcLbImg">
      <div class="lightbox-controls">
        <button class="lightbox-btn" id="gcLbPrev">&lsaquo;</button>
        <span class="lightbox-counter" id="gcLbCounter"></span>
        <button class="lightbox-btn" id="gcLbNext">&rsaquo;</button>
      </div>
    `;
    document.body.appendChild(overlay);
    const imgEl = document.getElementById("gcLbImg");
    const labelEl = document.getElementById("gcLbLabel");
    const counterEl = document.getElementById("gcLbCounter");
    const show = (i) => {
      cur = (i + total) % total;
      imgEl.src = urls[cur];
      labelEl.textContent = labels[cur] || "";
      counterEl.textContent = `${cur+1} / ${total}`;
    };
    show(cur);
    document.getElementById("gcLbPrev").addEventListener("click", e => { e.stopPropagation(); show(cur-1); });
    document.getElementById("gcLbNext").addEventListener("click", e => { e.stopPropagation(); show(cur+1); });
    document.getElementById("gcLbClose").addEventListener("click", () => overlay.remove());
    overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
    // 画像本体タップでも閉じる
    imgEl.style.cursor = "zoom-out";
    imgEl.addEventListener("click", (e) => { e.stopPropagation(); overlay.remove(); });
  }

  function switchTopTab(tab) {
    activeTopTab = tab;
    topTabsEl.querySelectorAll(".top-tab").forEach(t => {
      t.classList.toggle("active", t.dataset.topTab === tab);
    });
    if (tab === "checklist") {
      areaTabsEl.classList.remove("d-none");
      renderActiveArea();
    } else {
      areaTabsEl.classList.add("d-none");
      renderPhotos();
    }
  }
  topTabsEl.querySelectorAll(".top-tab").forEach(t => {
    t.addEventListener("click", () => switchTopTab(t.dataset.topTab));
  });

  function wireArea(area) {
    content.querySelectorAll("[data-cat-toggle]").forEach(h => {
      h.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const id = h.dataset.catToggle;
        if (collapsedSet.has(id)) collapsedSet.delete(id);
        else collapsedSet.add(id);
        saveCollapsed();
        h.parentElement.classList.toggle("collapsed");
      });
    });
    content.querySelectorAll('[data-stop="1"]').forEach(el => {
      el.addEventListener("click", (ev) => ev.stopPropagation());
    });
    // 見本写真サムネ → ライトボックス
    content.querySelectorAll(".gc-thumb").forEach(img => {
      img.addEventListener("click", (ev) => {
        ev.stopPropagation();
        let urls;
        try { urls = JSON.parse(img.dataset.thumbAll || "[]"); }
        catch (e) { urls = [img.dataset.thumbUrl]; }
        const label = img.dataset.thumbLabel || "";
        const labels = urls.map(() => label);
        const idx = parseInt(img.dataset.thumbIdx || "0", 10);
        openLightbox(urls, labels, idx);
      });
    });
    content.querySelectorAll(".gc-restock").forEach(cb => {
      cb.addEventListener("change", async () => {
        const id = cb.dataset.restockId;
        const st = itemStates[id] || {};
        await sendToggle(id, !!st.checked, cb.checked);
      });
    });
    content.querySelectorAll(".gc-item").forEach(row => {
      row.addEventListener("click", async (ev) => {
        if (ev.target.closest('[data-stop="1"]')) return;
        const id = row.dataset.itemId;
        const st = itemStates[id] || {};
        const newChecked = !st.checked;
        // 楽観 UI 更新
        row.classList.toggle("checked", newChecked);
        await sendToggle(id, newChecked);
      });
    });
    content.querySelector("#btnToggleAllExpand")?.addEventListener("click", () => {
      const catIds = [];
      const walk = (x) => {
        (x.taskTypes || []).forEach(c => { catIds.push(c.id); walk(c); });
        (x.subCategories || []).forEach(c => { catIds.push(c.id); walk(c); });
        (x.subSubCategories || []).forEach(c => { catIds.push(c.id); walk(c); });
      };
      walk(area);
      const anyOpen = catIds.some(id => !collapsedSet.has(id));
      catIds.forEach(id => {
        if (anyOpen) collapsedSet.add(id);
        else collapsedSet.delete(id);
      });
      saveCollapsed();
      renderActiveArea();
    });
  }

  async function sendToggle(itemId, checked, restock) {
    if (!checklistId) return;
    pendingItems.add(itemId);
    try {
      const body = { checklistId, itemId, checked };
      if (typeof restock === "boolean") body.restock = restock;
      const res = await fetch(`${API_BASE}/helper-checklist/toggle`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      // onSnapshot が itemStates を更新するので追加処理不要
    } catch (e) {
      showToast(`保存失敗: ${e.message}`, 3000);
      // 楽観更新を巻き戻し: onSnapshot が次に来るまで一旦見た目を戻す
      const row = content.querySelector(`.gc-item[data-item-id="${CSS.escape(itemId)}"]`);
      if (row) row.classList.toggle("checked", !!itemStates[itemId]?.checked);
    } finally {
      pendingItems.delete(itemId);
    }
  }

  function updateProgress() {
    let total = 0, cnt = 0;
    areas.forEach(a => { total += countItems(a); cnt += countChecked(a); });
    checkedCountEl.textContent = cnt;
    totalCountEl.textContent = total;
    progressFill.style.width = total > 0 ? `${(cnt/total*100).toFixed(0)}%` : "0%";
  }

  if (!propertyId) {
    content.className = "empty-state";
    content.innerHTML = `<i class="bi bi-exclamation-triangle fs-1 text-warning"></i><p class="mt-2">物件 ID が指定されていません<br><small class="text-muted">URL に <code>?p=物件ID</code> を付けてください</small></p>`;
    return;
  }

  // === Step 1: 直近 active checklist を取得 ===
  fetch(`${API_BASE}/helper-checklist/active?propertyId=${encodeURIComponent(propertyId)}`)
    .then(async r => {
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e.error || `HTTP ${r.status}`);
      }
      return r.json();
    })
    .then(info => {
      checklistId = info.checklistId;
      // API が返した物件名を必ず採用 (URL の n= は表示前のプレースホルダ。
      // checklistId は propertyId から逆引き済みなので、API 値が真実)
      if (info.propertyName) {
        document.getElementById("propName").textContent = info.propertyName;
        document.title = `${info.propertyName} - ヘルパー用 清掃チェックリスト`;
      }
      // === Step 2: onSnapshot で checklist 本体を購読 ===
      firebase.firestore().collection("checklists").doc(checklistId)
        .onSnapshot(doc => {
          if (!doc.exists) {
            content.className = "empty-state";
            content.innerHTML = `<i class="bi bi-x-circle fs-1 text-danger"></i><p class="mt-2">チェックリストが削除されました</p>`;
            progressBar.classList.add("d-none");
            return;
          }
          const data = doc.data();
          const snapshot = data.templateSnapshot || [];
          areas = snapshot.slice().sort((x,y) => (x.sortOrder||0) - (y.sortOrder||0));
          itemStates = data.itemStates || {};
          if (!activeAreaId && areas.length > 0) activeAreaId = areas[0].id;
          if (areas.length === 0) {
            content.className = "empty-state";
            content.innerHTML = `<i class="bi bi-inbox fs-1 text-muted"></i><p class="mt-2">チェック項目がありません</p>`;
            return;
          }
          renderTabs();
          // 写真件数バッジ更新
          const photoN = collectSamples().length;
          if (photoN > 0) photoCountEl.textContent = String(photoN);
          else photoCountEl.textContent = "";
          topTabsEl.classList.remove("d-none");
          // 現在のタブに応じて再描画
          if (activeTopTab === "checklist") renderActiveArea();
          else renderPhotos();
          updateProgress();
          progressBar.classList.remove("d-none");
          liveStatus.innerHTML = `<i class="bi bi-broadcast text-success"></i> 同期中`;
        }, err => {
          console.error(err);
          liveStatus.innerHTML = `<i class="bi bi-x-circle text-danger"></i> 同期エラー`;
        });
    })
    .catch(err => {
      console.error(err);
      content.className = "empty-state";
      const msg = err.message === "no active checklist"
        ? "現在この物件には進行中のチェックリストがありません<br><small class='text-muted'>清掃シフトが作成されると表示されます</small>"
        : `読み込みに失敗しました<br><small class="text-muted">${esc(err.message)}</small>`;
      content.innerHTML = `<i class="bi bi-inbox fs-1 text-muted"></i><p class="mt-2">${msg}</p>`;
    });
})();
</script>
</body>
</html>
