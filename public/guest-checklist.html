<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清掃チェックリスト</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  body { background:#f8fafc; padding-bottom:80px; }
  .header-bar {
    position:sticky; top:0; z-index:10;
    background: linear-gradient(135deg, #ff7a18 0%, #ff5e62 25%, #af3fff 55%, #2196f3 100%);
    color:#fff; padding:12px 16px; box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .header-bar h1 { font-size:1.1rem; margin:0; font-weight:700; }
  .header-bar .sub { font-size:0.8rem; opacity:0.9; }
  .container { max-width:720px; }
  .area-card { margin-top:12px; }
  .area-name { background:#1e293b; color:#fff; padding:8px 12px; border-radius:8px 8px 0 0; font-weight:700; }
  .tasktype-name { background:#e2e8f0; padding:6px 12px; font-weight:600; font-size:0.95rem; }
  .subcat-name { background:#f1f5f9; padding:4px 12px 4px 24px; font-weight:500; font-size:0.9rem; color:#475569; }
  .item-row {
    display:flex; align-items:flex-start; padding:10px 12px; border-bottom:1px solid #e2e8f0;
    cursor:pointer; user-select:none; transition:background 0.1s;
  }
  .item-row:hover { background:#f8fafc; }
  .item-row.checked { background:#f0fdf4; }
  .item-row.checked .item-name { text-decoration:line-through; color:#94a3b8; }
  .item-check {
    flex-shrink:0; width:28px; height:28px; border:2px solid #cbd5e1; border-radius:6px;
    margin-right:12px; display:flex; align-items:center; justify-content:center;
    background:#fff; transition:all 0.15s;
  }
  .item-row.checked .item-check { background:#22c55e; border-color:#22c55e; }
  .item-check i { color:#fff; font-size:1.1rem; opacity:0; transition:opacity 0.1s; }
  .item-row.checked .item-check i { opacity:1; }
  .item-name { flex-grow:1; font-size:0.95rem; line-height:1.4; padding-top:2px; }
  .item-name .supply-badge {
    background:#fef3c7; color:#92400e; padding:1px 6px; border-radius:4px;
    font-size:0.7rem; margin-left:6px; font-weight:600;
  }
  .progress-fixed {
    position:fixed; bottom:0; left:0; right:0; background:#fff;
    padding:12px 16px; box-shadow:0 -2px 8px rgba(0,0,0,0.1); z-index:20;
  }
  .progress-fixed .progress { height:8px; }
  .reset-btn {
    background:none; border:none; color:#94a3b8; font-size:0.8rem;
    text-decoration:underline; cursor:pointer;
  }
  .empty-state { padding:40px 20px; text-align:center; color:#64748b; }
  .loading { padding:40px 20px; text-align:center; color:#94a3b8; }
</style>
</head>
<body>

<div class="header-bar">
  <h1><i class="bi bi-clipboard-check"></i> <span id="propName">清掃チェックリスト</span></h1>
  <div class="sub">タップしてチェック (端末内に保存されます)</div>
</div>

<div class="container">
  <div id="content" class="loading">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2">読み込み中...</div>
  </div>
</div>

<div class="progress-fixed d-none" id="progressBar">
  <div class="d-flex align-items-center mb-1">
    <span class="small fw-bold flex-grow-1"><span id="checkedCount">0</span> / <span id="totalCount">0</span> 完了</span>
    <button class="reset-btn" id="resetBtn"><i class="bi bi-arrow-counterclockwise"></i> リセット</button>
  </div>
  <div class="progress">
    <div class="progress-bar bg-success" id="progressFill" style="width:0%"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=0504c"></script>
<script>
(function() {
  const params = new URLSearchParams(location.search);
  const propertyId = params.get("p") || "";
  const propertyName = params.get("n") || "";
  if (propertyName) document.getElementById("propName").textContent = propertyName;

  const content = document.getElementById("content");
  const progressBar = document.getElementById("progressBar");
  const checkedCountEl = document.getElementById("checkedCount");
  const totalCountEl = document.getElementById("totalCount");
  const progressFill = document.getElementById("progressFill");
  const resetBtn = document.getElementById("resetBtn");

  const STORAGE_KEY = `guestChecklist_${propertyId}`;
  let checkedSet = new Set();
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) checkedSet = new Set(JSON.parse(raw));
  } catch (e) {}

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...checkedSet])); } catch (e) {}
  }

  function esc(s) {
    return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  function renderItem(item, idPrefix) {
    const itemId = `${idPrefix}_${item.id}`;
    const checked = checkedSet.has(itemId);
    const supply = item.supplyItem ? '<span class="supply-badge">補充</span>' : "";
    return `
      <div class="item-row${checked ? " checked" : ""}" data-id="${esc(itemId)}">
        <div class="item-check"><i class="bi bi-check-lg"></i></div>
        <div class="item-name">${esc(item.name)}${supply}</div>
      </div>`;
  }

  function renderArea(area) {
    let html = `<div class="area-card card shadow-sm"><div class="area-name">${esc(area.name)}</div>`;
    const aPrefix = `a_${area.id}`;
    // directItems
    const directs = (area.directItems || []).slice().sort((x,y)=>(x.sortOrder||0)-(y.sortOrder||0));
    directs.forEach(it => { html += renderItem(it, aPrefix); });
    // taskTypes
    const tts = (area.taskTypes || []).slice().sort((x,y)=>(x.sortOrder||0)-(y.sortOrder||0));
    tts.forEach(tt => {
      html += `<div class="tasktype-name">${esc(tt.name)}</div>`;
      const ttPrefix = `${aPrefix}_t_${tt.id}`;
      const ttd = (tt.directItems || []).slice().sort((x,y)=>(x.sortOrder||0)-(y.sortOrder||0));
      ttd.forEach(it => { html += renderItem(it, ttPrefix); });
      const subcats = (tt.subCategories || []).slice().sort((x,y)=>(x.sortOrder||0)-(y.sortOrder||0));
      subcats.forEach(sc => {
        html += `<div class="subcat-name">${esc(sc.name)}</div>`;
        const scPrefix = `${ttPrefix}_s_${sc.id}`;
        const scd = (sc.directItems || []).slice().sort((x,y)=>(x.sortOrder||0)-(y.sortOrder||0));
        scd.forEach(it => { html += renderItem(it, scPrefix); });
      });
    });
    html += `</div>`;
    return html;
  }

  function updateProgress() {
    const allItems = document.querySelectorAll(".item-row");
    const checked = document.querySelectorAll(".item-row.checked");
    const total = allItems.length;
    const cnt = checked.length;
    checkedCountEl.textContent = cnt;
    totalCountEl.textContent = total;
    progressFill.style.width = total > 0 ? `${(cnt/total*100).toFixed(0)}%` : "0%";
  }

  function attachClicks() {
    document.querySelectorAll(".item-row").forEach(row => {
      row.addEventListener("click", () => {
        const id = row.dataset.id;
        if (checkedSet.has(id)) {
          checkedSet.delete(id);
          row.classList.remove("checked");
        } else {
          checkedSet.add(id);
          row.classList.add("checked");
        }
        saveState();
        updateProgress();
      });
    });
  }

  resetBtn.addEventListener("click", () => {
    if (!confirm("チェックを全部リセットしますか?")) return;
    checkedSet.clear();
    saveState();
    document.querySelectorAll(".item-row.checked").forEach(r => r.classList.remove("checked"));
    updateProgress();
  });

  if (!propertyId) {
    content.className = "empty-state";
    content.innerHTML = `<i class="bi bi-exclamation-triangle fs-1 text-warning"></i><p class="mt-2">物件 ID が指定されていません<br><small class="text-muted">URL に <code>?p=物件ID</code> を付けてください</small></p>`;
    return;
  }

  firebase.firestore().collection("checklistTemplates").doc(propertyId).get()
    .then(doc => {
      if (!doc.exists) {
        content.className = "empty-state";
        content.innerHTML = `<i class="bi bi-inbox fs-1 text-muted"></i><p class="mt-2">この物件のチェックリストはまだありません</p>`;
        return;
      }
      const data = doc.data();
      const areas = (data.areas || []).slice().sort((x,y)=>(x.sortOrder||0)-(y.sortOrder||0));
      if (areas.length === 0) {
        content.className = "empty-state";
        content.innerHTML = `<i class="bi bi-inbox fs-1 text-muted"></i><p class="mt-2">チェック項目がありません</p>`;
        return;
      }
      content.className = "";
      content.innerHTML = areas.map(renderArea).join("");
      attachClicks();
      updateProgress();
      progressBar.classList.remove("d-none");
    })
    .catch(err => {
      console.error(err);
      content.className = "empty-state";
      content.innerHTML = `<i class="bi bi-exclamation-circle fs-1 text-danger"></i><p class="mt-2">読み込みに失敗しました<br><small class="text-muted">${esc(err.message)}</small></p>`;
    });
})();
</script>
</body>
</html>
