name: E2E Tests
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Verify ADC + createCustomToken
        working-directory: tests
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS"
          node -e "
            const admin = require('firebase-admin');
            admin.initializeApp({ projectId: 'minpaku-v2', credential: admin.credential.applicationDefault() });
            admin.auth().createCustomToken('rwHczfRz8DfnWCrQ7yeAYnsd8in2', { role: 'owner' })
              .then(t => { console.log('createCustomToken OK:', t.slice(0, 30) + '...'); process.exit(0); })
              .catch(e => { console.error('createCustomToken NG:', e.message); process.exit(1); });
          "

      - name: Run E2E tests
        working-directory: tests
        env:
          CI: "true"
        run: npm test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
